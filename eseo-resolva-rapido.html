<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, Segoe UI, Arial, sans-serif;
    background: #f3f6f9;
    padding: 32px 48px 36px;
    overflow: hidden;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 20px;
  }
  .title { font-size: 22px; font-weight: 800; color: #061a30; }
  .sub { font-size: 14px; color: #637083; margin-top: 4px; }
  .ver { font-size: 13px; color: #0b63ce; font-weight: 700; text-decoration: none; }
  .ver:hover { text-decoration: underline; }
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
  }
  .card {
    background: #fff;
    border: 1px solid #dfe5ec;
    border-radius: 14px;
    padding: 16px 10px;
    text-align: center;
    text-decoration: none;
    color: #061a30;
    display: block;
    transition: .2s ease;
    cursor: pointer;
  }
  .card:hover {
    background: #eef6ff;
    border-color: #0b63ce;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(11,99,206,.12);
  }
  .icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #e2effe;
    color: #0b63ce;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    font-size: 22px;
  }
  .card strong { display: block; font-size: 13px; font-weight: 800; }
  .card small { font-size: 11px; color: #637083; margin-top: 3px; display: block; }
  @media(max-width:700px) { .grid { grid-template-columns: repeat(3,1fr); } }
  @media(max-width:420px) { .grid { grid-template-columns: repeat(2,1fr); } body { padding: 24px 18px; } }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="title">Resolva rápido</div>
    <div class="sub">Os serviços mais usados, sem caça ao tesouro.</div>
  </div>
  <a class="ver" href="#">Ver todos →</a>
</div>
<div class="grid">

  <a class="card" href="#">
    <div class="icon">🎓</div>
    <strong>Portfólio de Cursos</strong>
    <small>Catálogo EAD</small>
  </a>

  <a class="card" href="#">
    <div class="icon">🔓</div>
    <strong>Liberar Turma</strong>
    <small>SGSET</small>
  </a>

  <a class="card" href="#">
    <div class="icon">⭐</div>
    <strong>Soluções EAD</strong>
    <small>Recursos disponíveis</small>
  </a>

  <a class="card" href="#">
    <div class="icon">🤝</div>
    <strong>Parceria AQV</strong>
    <small>ESEO</small>
  </a>

  <a class="card" href="#">
    <div class="icon">📄</div>
    <strong>Materiais</strong>
    <small>Guias e manuais</small>
  </a>

  <a class="card" href="#">
    <div class="icon">💬</div>
    <strong>Fale com a ESEO</strong>
    <small>Suporte e contato</small>
  </a>

</div>
</body>
</html>
