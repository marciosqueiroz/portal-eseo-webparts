<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Menu do Portal ESEO</title>

  <style>
    :root {
      --preto: #000000;
      --amarelo: #F7B900;
      --branco: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .menu {
      align-items: center;
      background: var(--preto);
      display: flex;
      justify-content: center;
      min-height: 70px;
      padding: 0 24px;
      width: 100%;
    }

    .menu a {
      color: var(--branco);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 26px 30px 22px;
      position: relative;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Barra inferior: inicialmente invisível */

    .menu a::after {
      background: transparent;
      bottom: 7px;
      content: "";
      height: 4px;
      left: 30px;
      position: absolute;
      right: 30px;
    }

    /* Página atual */

    .menu a.ativo {
      color: var(--amarelo);
    }

    .menu a.ativo::after {
      background: var(--amarelo);
    }

    /* Ao passar o cursor:
       somente o texto muda de cor */

    .menu a:hover {
      color: var(--amarelo);
    }

    /* Navegação pelo teclado */

    .menu a:focus-visible {
      color: var(--amarelo);
      outline: 2px solid var(--amarelo);
      outline-offset: -6px;
    }

    /* Celular e telas menores */

    @media (max-width: 760px) {
      .menu {
        justify-content: flex-start;
        overflow-x: auto;
        padding: 0 8px;
      }

      .menu a {
        flex: none;
        font-size: 16px;
        padding-left: 18px;
        padding-right: 18px;
      }

      .menu a::after {
        left: 18px;
        right: 18px;
      }
    }
  </style>
</head>

<body>

  <nav
    class="menu"
    aria-label="Navegação principal do Portal ESEO"
  >

    <a
      class="ativo"
      href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta"
      target="_top"
    >
      Home
    </a>

    <a
      href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/Sobre-a-ESEO.aspx"
      target="_top"
    >
      Conheça a ESEO
    </a>

    <a
      href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/What's-happening.aspx"
      target="_top"
    >
      Oferta de Cursos Online
    </a>

  </nav>

</body>

</html>
