<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --preto: #000000;
  --amarelo: #F7B900;
  --branco: #FFFFFF;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  background: transparent;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

.menu {
  align-items: center;
  background: var(--preto);
  display: flex;
  justify-content: center;
  min-height: 70px;
  padding: 0 18px;
}

.menu a {
  color: var(--branco);
  font-size: 13px;
  font-weight: 700;
  padding: 26px 28px 22px;
  position: relative;
  text-decoration: none;
  text-transform: uppercase;
  white-space: nowrap;
}

/* Barra amarela interna */
.menu a::after {
  background: transparent;
  bottom: 7px;
  content: "";
  height: 4px;
  left: 28px;
  position: absolute;
  right: 28px;
}

/* Página selecionada */
.menu a.ativo {
  color: var(--amarelo);
}

.menu a.ativo::after {
  background: var(--amarelo);
}

/* Passar o mouse */
.menu a:hover {
  color: var(--amarelo);
}

.menu a:hover::after {
  background: var(--amarelo);
}

@media (max-width: 760px) {
  .menu {
    justify-content: flex-start;
    overflow-x: auto;
  }

  .menu a {
    font-size: 11px;
    padding-left: 17px;
    padding-right: 17px;
  }

  .menu a::after {
    left: 17px;
    right: 17px;
  }
}
</style>
</head>

<body>

<nav class="menu" aria-label="Navegação principal do Portal ESEO">

  <a
    class="ativo"
    href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta"
    target="_top">
    Home
  </a>

  <a
    href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/Sobre-a-ESEO.aspx"
    target="_top">
    Conheça a ESEO
  </a>

  <a
    href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/What's-happening.aspx"
    target="_top">
    Oferta de Cursos Online
  </a>

</nav>

</body>
</html>
