<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu superior e busca — Portal ESEO</title>

  <style>
    :root {
      --eseo-navy: #061923;
      --eseo-navy-soft: #173543;
      --eseo-cyan: #0eb7d5;
      --eseo-red: #e30613;
      --eseo-white: #ffffff;
      --eseo-muted: rgba(255, 255, 255, 0.78);
      --eseo-focus: #79d9ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 108px;
      margin: 0;
      overflow-x: hidden;
      background: transparent !important;
      background-color: rgba(0, 0, 0, 0) !important;
      color-scheme: normal;
      color: var(--eseo-white);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .nav-shell {
      width: min(1500px, 100%);
      min-height: 108px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: clamp(30px, 4vw, 70px);
      margin: 0 auto;
      padding: 14px clamp(22px, 3.2vw, 50px);
      background: transparent;
    }

    .menu {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: clamp(28px, 3.1vw, 54px);
      white-space: nowrap;
    }

    .menu__link {
      position: relative;
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      padding: 3px 0 0;
      color: var(--eseo-white);
      font-size: clamp(15px, 1.1vw, 18px);
      font-weight: 850;
      letter-spacing: 0.01em;
      line-height: 1.15;
      text-decoration: none;
      text-shadow:
        0 2px 5px rgba(0, 0, 0, 0.75),
        0 0 18px rgba(0, 0, 0, 0.42);
      text-transform: uppercase;
      transition: color 180ms ease;
    }

    .menu__link::after {
      position: absolute;
      right: 50%;
      bottom: 3px;
      left: 50%;
      height: 3px;
      border-radius: 99px;
      content: "";
      background: var(--eseo-cyan);
      transition:
        right 190ms ease,
        left 190ms ease;
    }

    .menu__link:hover,
    .menu__link:focus-visible,
    .menu__link.is-active {
      color: var(--eseo-cyan);
    }

    /* A página atual fica colorida. O sublinhado surge apenas no hover/foco. */
    .menu__link:hover::after,
    .menu__link:focus-visible::after {
      right: 0;
      left: 0;
    }

    .search-wrap {
      position: relative;
      width: clamp(390px, 34vw, 540px);
      min-width: 360px;
    }

    .portal-search {
      position: relative;
      width: 100%;
      min-height: 60px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 34px;
      align-items: center;
      gap: 10px;
      padding: 7px 14px 7px 12px;
      overflow: visible;
      border: 1px solid transparent;
      border-radius: 999px;
      background:
        linear-gradient(
          112deg,
          rgba(3, 15, 24, 0.88) 0%,
          rgba(10, 37, 55, 0.8) 52%,
          rgba(29, 114, 143, 0.58) 100%
        ) padding-box,
        linear-gradient(
          96deg,
          var(--eseo-cyan) 0%,
          rgba(255, 255, 255, 0.46) 58%,
          var(--eseo-red) 100%
        ) border-box;
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
      color: var(--eseo-white);
      backdrop-filter: blur(14px) saturate(125%);
      -webkit-backdrop-filter: blur(14px) saturate(125%);
      transition:
        box-shadow 180ms ease,
        transform 180ms ease;
    }

    .portal-search::after {
      position: absolute;
      right: 24px;
      bottom: 4px;
      left: 24px;
      height: 3px;
      border-radius: 99px;
      content: "";
      background: linear-gradient(
        90deg,
        var(--eseo-cyan),
        #48d3e9 56%,
        var(--eseo-red)
      );
      box-shadow:
        0 2px 14px rgba(14, 183, 213, 0.42),
        0 0 16px rgba(227, 6, 19, 0.13);
      opacity: 1;
    }

    .portal-search:focus-within {
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.3),
        0 0 0 3px rgba(14, 183, 213, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }

    .portal-search__leading,
    .portal-search__clear {
      display: grid;
      place-items: center;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: currentColor;
    }

    .portal-search__leading {
      width: 34px;
      height: 34px;
      color: var(--eseo-cyan);
      cursor: pointer;
      filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.72));
      transition:
        background 180ms ease,
        color 180ms ease,
        transform 180ms ease;
    }

    .portal-search__leading:hover,
    .portal-search__leading:focus-visible {
      background: rgba(14, 183, 213, 0.14);
      color: #72e5f8;
      transform: scale(1.04);
    }

    .portal-search__clear {
      width: 34px;
      height: 34px;
      color: rgba(255, 255, 255, 0.78);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.78);
      transition:
        background 180ms ease,
        color 180ms ease,
        opacity 150ms ease,
        transform 180ms ease;
    }

    .portal-search__clear.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .portal-search__clear:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--eseo-white);
    }

    .portal-search svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .portal-search__clear svg {
      width: 19px;
      height: 19px;
    }

    .portal-search__input {
      width: 100%;
      min-width: 0;
      height: 40px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--eseo-white);
      caret-color: var(--eseo-cyan);
      font-size: clamp(15px, 1.1vw, 18px);
      font-weight: 700;
      letter-spacing: 0.005em;
      line-height: 1.2;
      text-shadow: 0 2px 7px rgba(0, 0, 0, 0.75);
    }

    .portal-search__input::placeholder {
      color: rgba(255, 255, 255, 0.92);
      opacity: 1;
    }

    .search-hint {
      position: absolute;
      top: calc(100% + 7px);
      right: 18px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
      transform: translateY(-3px);
      transition:
        opacity 180ms ease,
        transform 180ms ease;
    }

    .search-wrap:focus-within .search-hint {
      opacity: 1;
      transform: translateY(0);
    }

    .menu__link:focus-visible,
    .portal-search__leading:focus-visible,
    .portal-search__clear:focus-visible,
    .portal-search__input:focus-visible {
      outline: 3px solid var(--eseo-focus);
      outline-offset: 3px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      border: 0;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    @media (max-width: 1100px) {
      .nav-shell {
        gap: 25px;
        padding-inline: 17px;
      }

      .menu {
        gap: 24px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .menu::-webkit-scrollbar {
        display: none;
      }

      .menu__link {
        flex: none;
        font-size: 13px;
      }

      .search-wrap {
        width: 340px;
        min-width: 310px;
      }
    }

    @media (max-width: 790px) {
      html,
      body {
        min-height: 174px;
      }

      .nav-shell {
        min-height: 174px;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        gap: 11px;
        padding-block: 12px 25px;
      }

      .menu {
        min-height: 48px;
        justify-content: flex-start;
      }

      .search-wrap {
        width: 100%;
        min-width: 0;
      }

      .portal-search {
        min-height: 55px;
      }
    }

    /* Busca compacta: começa como lupa e se expande no hover ou foco. */
    .search-wrap {
      width: 52px;
      min-width: 52px;
      margin-left: auto;
      transition: width 240ms cubic-bezier(.2,.8,.2,1);
    }

    .search-wrap:hover,
    .search-wrap:focus-within {
      width: clamp(350px, 34vw, 520px);
    }

    .portal-search {
      min-height: 52px;
      grid-template-columns: 44px minmax(0, 1fr) 34px;
      gap: 0;
      padding: 0 8px 0 3px;
      overflow: hidden;
      box-shadow:
        0 10px 28px rgba(0,0,0,.24),
        0 0 22px rgba(14,183,213,.10),
        inset 0 1px 0 rgba(255,255,255,.14);
    }

    .portal-search::after {
      right: 18px;
      bottom: 3px;
      left: 18px;
      height: 2px;
      opacity: 0;
      transform: scaleX(.18);
      transition: opacity 180ms ease, transform 230ms ease;
    }

    .search-wrap:hover .portal-search::after,
    .search-wrap:focus-within .portal-search::after {
      opacity: 1;
      transform: scaleX(1);
    }

    .portal-search__leading {
      width: 44px;
      height: 44px;
    }

    .portal-search__input {
      height: 38px;
      opacity: 1;
      transform: translateX(0);
      transition: opacity 150ms ease, transform 210ms ease;
    }

    .search-wrap:not(:hover):not(:focus-within) .portal-search__input {
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px);
    }

    .search-wrap:not(:hover):not(:focus-within) .portal-search__clear {
      display: none;
    }

    @media (max-width: 790px) {
      .search-wrap {
        width: 52px;
        min-width: 52px;
        align-self: flex-end;
      }

      .search-wrap:hover,
      .search-wrap:focus-within {
        width: 100%;
      }

      .portal-search { min-height: 52px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <header class="nav-shell">
    <nav class="menu" aria-label="Navegação principal do Portal ESEO">
      <a
        class="menu__link"
        data-page="home"
        href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta"
        target="_top"
      >Home</a>

      <a
        class="menu__link"
        data-page="conheca"
        href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/Sobre-a-ESEO.aspx"
        target="_top"
      >Conheça a ESEO</a>

      <a
        class="menu__link"
        data-page="oferta"
        href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/What's-happening.aspx"
        target="_top"
      >Oferta de cursos online</a>
    </nav>

    <div class="search-wrap">
      <form
        class="portal-search"
        id="portalSearch"
        role="search"
        autocomplete="off"
      >
        <button
          class="portal-search__leading"
          id="searchToggle"
          type="button"
          aria-label="Pesquisar no Portal ESEO"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10.5" cy="10.5" r="6.5"></circle>
            <path d="m19.5 19.5-4.4-4.4"></path>
          </svg>
        </button>

        <label class="sr-only" for="siteSearch">
          Pesquisar somente no Portal ESEO
        </label>

        <input
          class="portal-search__input"
          id="siteSearch"
          name="q"
          type="search"
          list="eseoSuggestions"
          placeholder="Pesquisar no Portal ESEO"
          aria-describedby="searchHint"
          autocomplete="off"
          spellcheck="true"
          required
        >

        <button
          class="portal-search__clear"
          id="clearSearch"
          type="button"
          aria-label="Limpar pesquisa"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18"></path>
          </svg>
        </button>

        <datalist id="eseoSuggestions">
          <option value="Home do Portal ESEO">Página inicial</option>
          <option value="Conheça a ESEO">História, identidade e estrutura</option>
          <option value="Oferta de cursos online">Cursos e possibilidades de oferta</option>
          <option value="Portfólio de cursos">Catálogo completo de cursos EAD</option>
          <option value="Liberar turma SGSET">Solicitação de liberação de turma</option>
          <option value="Soluções EAD">Cursos novos e ofertas personalizadas</option>
          <option value="Parceria AQV ESEO">Apoio da ESEO para ações AQV</option>
          <option value="Boletim ESEO">Novidades da educação a distância</option>
          <option value="Catálogo de cursos">Cursos disponíveis no portal</option>
          <option value="Orientações às unidades">Fluxos, papéis e documentos</option>
          <option value="Proposta pedagógica">Proposta Pedagógica da ESEO</option>
          <option value="Calendários">Calendários vigentes</option>
          <option value="Tutoria e monitoria">Atuação da equipe CTM</option>
          <option value="Cursos autoinstrucionais">Oferta autoinstrucional</option>
          <option value="Atendimento ESEO">Canais de suporte e atendimento</option>
        </datalist>
      </form>

      <span class="search-hint" id="searchHint">
        Escolha uma sugestão ou pesquise em todo o portal
      </span>
    </div>
  </header>

  <script>
    (function () {
      const PORTAL_BASE =
        "https://sesisenaisp.sharepoint.com/sites/ESEOConecta";

      const DIRECT_DESTINATIONS = [
        {
          value: "Home do Portal ESEO",
          url: PORTAL_BASE,
          target: "_top"
        },
        {
          value: "Conheça a ESEO",
          url: PORTAL_BASE + "/SitePages/Sobre-a-ESEO.aspx",
          target: "_top"
        },
        {
          value: "Oferta de cursos online",
          url: PORTAL_BASE + "/SitePages/What's-happening.aspx",
          target: "_top"
        },
        {
          value: "Portfólio de cursos",
          url:
            "https://app.powerbi.com/view?r=eyJrIjoiYzk1MzhjNWQtYTZlMy00ZmY4LWFiM2MtZGMxZjRlMzJiNDA3IiwidCI6IjQxNDhhNmRlLTBkZDEtNGQwNC1hNGM1LTc4ZTM3NGU0ZjZkNiIsImMiOjR9&pageName=ReportSection811927fa7d0805d7a097",
          target: "_blank"
        },
        {
          value: "Liberar turma SGSET",
          url:
            "https://forms.office.com/pages/responsepage.aspx?id=3qZIQdENBE2kxXjjdOT21kx71JN6hW5Mh8ztNWPFnzFUQUVTNDNQNEhDVkFRODFPUkdJWTlPSzNZMS4u",
          target: "_blank"
        },
        {
          value: "Soluções EAD",
          url:
            "https://outlook.office.com/mail/deeplink/compose?to=eadempresas%40sp.senai.br",
          target: "_blank"
        },
        {
          value: "Parceria AQV ESEO",
          url:
            "https://outlook.office.com/mail/deeplink/compose?to=rantonio%40sp.senai.br",
          target: "_blank"
        },
        {
          value: "Boletim ESEO",
          url:
            "https://outlook.office.com/newsletters/newsletters/eb0f379967babb4b816eae11c96c0d0322",
          target: "_blank"
        }
      ];

      const pages = ["home", "conheca", "oferta"];
      const links = Array.from(document.querySelectorAll("[data-page]"));
      const params = new URLSearchParams(window.location.search);
      const informedPage = (params.get("ativa") || "").toLowerCase();
      const parentUrl = (document.referrer || "").toLowerCase();

      let currentPage = pages.includes(informedPage) ? informedPage : "";

      if (!currentPage) {
        if (/what(?:%27|')?s-happening|oferta.*curso|cursos.*online/.test(parentUrl)) {
          currentPage = "oferta";
        } else if (/sobre-a-eseo|conhe(?:c|%c3%a7|ç)a.*eseo/.test(parentUrl)) {
          currentPage = "conheca";
        } else {
          currentPage = "home";
        }
      }

      links.forEach(function (link) {
        const active = link.dataset.page === currentPage;
        link.classList.toggle("is-active", active);

        if (active) {
          link.setAttribute("aria-current", "page");
        } else {
          link.removeAttribute("aria-current");
        }
      });

      const form = document.getElementById("portalSearch");
      const input = document.getElementById("siteSearch");
      const clearButton = document.getElementById("clearSearch");
      const searchToggle = document.getElementById("searchToggle");

      searchToggle.addEventListener("click", function () {
        if (document.activeElement === input && input.value.trim()) {
          form.requestSubmit();
          return;
        }

        input.focus();
      });

      function normalize(value) {
        return value
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .trim()
          .toLowerCase();
      }

      const destinations = new Map(
        DIRECT_DESTINATIONS.map(function (item) {
          return [normalize(item.value), item];
        })
      );

      function scopedSearchUrl(term) {
        const scopedQuery = term + ' Path:"' + PORTAL_BASE + '"';

        return (
          PORTAL_BASE +
          "/_layouts/15/search.aspx/siteall?q=" +
          encodeURIComponent(scopedQuery)
        );
      }

      function openDestination(destination) {
        if (destination.target === "_blank") {
          window.open(destination.url, "_blank", "noopener,noreferrer");
          return;
        }

        window.open(destination.url, "_top");
      }

      function updateClearButton() {
        clearButton.classList.toggle(
          "is-visible",
          input.value.trim().length > 0
        );
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        const term = input.value.trim();

        if (!term) {
          input.setCustomValidity(
            "Digite o que deseja localizar no Portal ESEO."
          );
          input.reportValidity();
          return;
        }

        input.setCustomValidity("");

        const directDestination = destinations.get(normalize(term));

        if (directDestination) {
          openDestination(directDestination);
          return;
        }

        window.open(scopedSearchUrl(term), "_top");
      });

      clearButton.addEventListener("click", function () {
        input.value = "";
        input.setCustomValidity("");
        updateClearButton();
        input.focus();
      });

      input.addEventListener("input", function () {
        input.setCustomValidity("");
        updateClearButton();
      });

      input.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && input.value) {
          input.value = "";
          updateClearButton();
        }
      });

      updateClearButton();
    }());
  </script>
</body>
</html>
