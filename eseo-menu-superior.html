<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu superior e busca — Portal ESEO</title>
  <style>
    :root {
      --navy:  #0a2537;
      --cyan:  #0eb7d5;
      --red:   #e30613;
      --white: #ffffff;
      --line:  rgba(220, 229, 234, 0.55);
      --muted: #5e6c75;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;           /* ✅ FUNDO TRANSPARENTE */
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .header {
      width: 100%;
      height: 100%;
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      padding: 0 clamp(24px, 3.2vw, 64px);
      border-bottom: 1px solid var(--line);
      background: transparent;           /* ✅ FUNDO TRANSPARENTE */
    }

    /* ── Menu ─────────────────────────────────────────────────────── */
    .menu {
      display: flex;
      align-items: stretch;
      gap: clamp(28px, 4vw, 72px);
      height: 100%;
    }
    .menu a {
      position: relative;
      display: flex;
      align-items: center;
      color: var(--navy);
      font-size: clamp(14px, 1.05vw, 18px);
      font-weight: 800;
      letter-spacing: .015em;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
      transition: color 180ms ease;
    }
    .menu a::after {
      position: absolute;
      right: 0; bottom: 0; left: 0;
      height: 4px;
      border-radius: 4px 4px 0 0;
      background: var(--cyan);
      content: "";
      opacity: 0;
      transform: scaleX(.3);
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .menu a:hover,
    .menu a:focus-visible,
    .menu a[aria-current="page"] { color: #007f9e; }
    .menu a:hover::after,
    .menu a:focus-visible::after,
    .menu a[aria-current="page"]::after { opacity: 1; transform: scaleX(1); }

    /* ── Search wrapper (needed for suggestions dropdown) ────────── */
    .search-wrapper {
      position: relative;
      flex: 0 0 auto;
    }

    /* ── Search pill ──────────────────────────────────────────────── */
    .search {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
      border: 1.5px solid var(--navy);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82); /* translúcido para contraste */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 18px rgba(10, 37, 55, .10);
      transition: width 260ms cubic-bezier(.2, .8, .2, 1),
                  border-color 180ms ease,
                  box-shadow 180ms ease;
    }
    .search.is-open,
    .search:focus-within {
      width: min(400px, 33vw);
      border-color: var(--cyan);
      box-shadow: 0 10px 28px rgba(10, 37, 55, .14);
    }

    .search__input {
      width: 0;
      min-width: 0;
      height: 48px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--navy);
      font: 650 15px/1 "Segoe UI", Arial, sans-serif;
      opacity: 0;
      pointer-events: none;
      transition: width 220ms ease, padding 220ms ease, opacity 140ms ease;
    }
    .search.is-open .search__input,
    .search:focus-within .search__input {
      width: calc(100% - 52px);
      padding: 0 4px 0 20px;
      opacity: 1;
      pointer-events: auto;
    }
    .search__input::placeholder { color: #74818a; }

    .search__button {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      flex: 0 0 48px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--navy);
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease;
    }
    .search__button:hover,
    .search__button:focus-visible {
      background: var(--navy);
      color: var(--white);
    }
    .search__button:focus-visible,
    .menu a:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 3px;
    }
    .search svg {
      width: 23px; height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
    }

    /* ── Autocomplete dropdown ────────────────────────────────────── */
    .suggestions {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: min(400px, 33vw);
      background: var(--white);
      border: 1.5px solid var(--cyan);
      border-radius: 16px;
      box-shadow: 0 14px 36px rgba(10, 37, 55, .16);
      z-index: 9999;
      overflow: hidden;
      list-style: none;
      margin: 0;
      padding: 6px 0;
      display: none;
      animation: fadeSlide 160ms ease;
    }
    .suggestions.visible { display: block; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .suggestion-item {
      padding: 10px 18px;
      font-size: 14px;
      color: var(--navy);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: "Segoe UI", Arial, sans-serif;
      transition: background 110ms ease;
    }
    .suggestion-item:hover,
    .suggestion-item.active {
      background: #eaf8fb;
      color: #007f9e;
    }
    .suggestion-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .suggestion-item .sugg-type {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .sugg-icon {
      width: 16px; height: 16px;
      min-width: 16px;
      fill: none;
      stroke: var(--cyan);
      stroke-width: 2;
      stroke-linecap: round;
      flex-shrink: 0;
    }
    .suggestions-footer {
      padding: 8px 18px 6px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid #eaf0f4;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .suggestions-footer svg {
      width: 13px; height: 13px;
      fill: none;
      stroke: var(--muted);
      stroke-width: 2;
      stroke-linecap: round;
      flex-shrink: 0;
    }
    .suggestions-loading {
      padding: 14px 18px;
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #dce5ea;
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Acessibilidade ───────────────────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Responsivo ───────────────────────────────────────────────── */
    @media (max-width: 820px) {
      .header { gap: 14px; padding: 0 16px; }
      .menu { gap: 18px; overflow: hidden; }
      .menu a { font-size: 12px; }
      .search.is-open,
      .search:focus-within { width: min(300px, 48vw); }
      .suggestions { width: min(300px, 48vw); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <header class="header">

    <!-- ── Navegação ──────────────────────────────────────────────── -->
    <nav class="menu" aria-label="Navegação principal do Portal ESEO">
      <a data-page="home"
         href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta"
         target="_blank" rel="noopener noreferrer">Home</a>

      <a data-page="conheca"
         href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/Sobre-a-ESEO.aspx"
         target="_blank" rel="noopener noreferrer">Conheça a ESEO</a>

      <a data-page="oferta"
         href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/What's-happening.aspx"
         target="_blank" rel="noopener noreferrer">Oferta de cursos online</a>
    </nav>

    <!-- ── Busca com autocomplete ─────────────────────────────────── -->
    <div class="search-wrapper">
      <form class="search" id="portalSearch" role="search">
        <label class="sr-only" for="siteSearch">Pesquisar no Portal ESEO</label>
        <input
          class="search__input"
          id="siteSearch"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="Pesquisar no Portal ESEO…"
          aria-autocomplete="list"
          aria-controls="searchSuggestions"
          aria-expanded="false"
          role="combobox"
        >
        <button class="search__button" type="submit" aria-label="Abrir pesquisa no Portal ESEO">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10.8" cy="10.8" r="6.8"></circle>
            <path d="m16 16 4.2 4.2"></path>
          </svg>
        </button>
      </form>

      <!-- Dropdown de sugestões -->
      <ul
        class="suggestions"
        id="searchSuggestions"
        role="listbox"
        aria-label="Sugestões de documentos do Portal ESEO"
      ></ul>
    </div>

  </header>

  <script>
  (function () {
    'use strict';

    /* ─── Configuração ─────────────────────────────────────────────── */
    const PORTAL_BASE = 'https://sesisenaisp.sharepoint.com/sites/ESEOConecta';

    /* ─── Elementos ────────────────────────────────────────────────── */
    const form        = document.getElementById('portalSearch');
    const input       = document.getElementById('siteSearch');
    const button      = form.querySelector('.search__button');
    const suggBox     = document.getElementById('searchSuggestions');
    const links       = [...document.querySelectorAll('[data-page]')];

    /* ─── Página ativa ─────────────────────────────────────────────── */
    const params      = new URLSearchParams(location.search);
    const infoPage    = (params.get('ativa') || '').toLowerCase();
    const ref         = (document.referrer || '').toLowerCase();
    const currentPage = ['home','conheca','oferta'].includes(infoPage) ? infoPage
      : ref.includes('sobre-a-eseo') ? 'conheca'
      : (ref.includes("what%27s-happening") || ref.includes("what's-happening")) ? 'oferta'
      : 'home';

    links.forEach(l => {
      if (l.dataset.page === currentPage) l.setAttribute('aria-current','page');
    });

    /* ─── Helpers ──────────────────────────────────────────────────── */
    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function labelFor(path) {
      if (!path) return '';
      const lower = path.toLowerCase();
      if (lower.includes('/sitepages/')) return 'Página';
      if (lower.includes('.pdf'))        return 'PDF';
      if (lower.includes('.docx') || lower.includes('.doc')) return 'Word';
      if (lower.includes('.xlsx') || lower.includes('.xls')) return 'Excel';
      if (lower.includes('.pptx') || lower.includes('.ppt')) return 'PPT';
      if (lower.includes('.mp4') || lower.includes('.mov')) return 'Vídeo';
      return 'Documento';
    }

    /* ─── Controle do campo ────────────────────────────────────────── */
    let activeIndex  = -1;
    let debounceId   = null;

    function openSearch() {
      form.classList.add('is-open');
      button.setAttribute('aria-label','Pesquisar no Portal ESEO');
      setTimeout(() => input.focus(), 180);
    }

    function closeSearch() {
      form.classList.remove('is-open');
      button.setAttribute('aria-label','Abrir pesquisa no Portal ESEO');
      hideSugg();
    }

    function doSearch(term) {
      if (!term) return;
      const q = term + ' Path:"' + PORTAL_BASE + '"';
      window.open(
        PORTAL_BASE + '/_layouts/15/search.aspx/siteall?q=' + encodeURIComponent(q),
        '_blank', 'noopener,noreferrer'
      );
    }

    /* ─── Sugestões ────────────────────────────────────────────────── */
    function hideSugg() {
      suggBox.classList.remove('visible');
      suggBox.innerHTML = '';
      input.setAttribute('aria-expanded','false');
      activeIndex = -1;
    }

    function showLoading() {
      suggBox.innerHTML =
        '<li class="suggestions-loading">' +
          '<div class="spinner"></div>Buscando nos documentos do Portal ESEO…' +
        '</li>';
      suggBox.classList.add('visible');
    }

    function renderSugg(items) {
      suggBox.innerHTML = '';
      activeIndex = -1;

      if (!items || !items.length) { hideSugg(); return; }

      items.forEach((item, i) => {
        const li = document.createElement('li');
        li.setAttribute('role','option');
        li.setAttribute('id','sugg-' + i);
        li.className = 'suggestion-item';

        const typeLabel = labelFor(item.url);

        li.innerHTML =
          /* ícone lupa */
          '<svg class="sugg-icon" viewBox="0 0 24 24" aria-hidden="true">' +
            '<circle cx="10.8" cy="10.8" r="6.8"/>' +
            '<path d="m16 16 4.2 4.2"/>' +
          '</svg>' +
          '<span>' + esc(item.title) + '</span>' +
          (typeLabel ? '<span class="sugg-type">' + esc(typeLabel) + '</span>' : '');

        li.addEventListener('mousedown', e => {
          e.preventDefault();
          window.open(item.url || doSearch(item.title), '_blank', 'noopener,noreferrer');
          if (!item.url) doSearch(item.title);
          hideSugg();
        });

        suggBox.appendChild(li);
      });

      /* rodapé */
      const foot = document.createElement('li');
      foot.setAttribute('role','presentation');
      foot.className = 'suggestions-footer';
      foot.innerHTML =
        '<svg viewBox="0 0 24 24" aria-hidden="true">' +
          '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' +
        '</svg>' +
        'Resultados restritos ao Portal ESEO';
      suggBox.appendChild(foot);

      suggBox.classList.add('visible');
      input.setAttribute('aria-expanded','true');
    }

    /* ─── API SharePoint Search (escopo: ESEOConecta) ──────────────── */
    function fetchSugg(term) {
      if (!term || term.length < 2) { hideSugg(); return; }

      showLoading();

      /* Busca documentos do site via Search REST API */
      const kw  = encodeURIComponent("'" + term + "* Path:" + PORTAL_BASE + "'");
      const sel = encodeURIComponent("Title,Path");
      const url = PORTAL_BASE
        + '/_api/search/query'
        + '?querytext='    + kw
        + '&rowlimit=7'
        + '&selectproperties=' + sel
        + '&trimduplicates=true'
        + '&ClientType=%27ContentSearchRegular%27';

      fetch(url, {
        credentials: 'include',
        headers: {
          'Accept': 'application/json;odata=verbose'
        }
      })
      .then(r => { if (!r.ok) throw new Error('SP Search error'); return r.json(); })
      .then(data => {
        const rows = (
          data?.d?.query
               ?.PrimaryQueryResult
               ?.RelevantResults
               ?.Table
               ?.Rows
               ?.results
        ) || [];

        const items = rows.map(row => {
          const cells = row?.Cells?.results || [];
          let title = '', url = '';
          cells.forEach(c => {
            if (c.Key === 'Title') title = c.Value || '';
            if (c.Key === 'Path')  url   = c.Value || '';
          });
          return { title: title || url.split('/').pop() || url, url };
        }).filter(i => i.title && i.url);

        renderSugg(items);
      })
      .catch(() => {
        /* Falha silenciosa — busca via submit continua funcionando */
        hideSugg();
      });
    }

    /* ─── Navegação por teclado ────────────────────────────────────── */
    function updateActive() {
      const items = [...suggBox.querySelectorAll('.suggestion-item')];
      items.forEach((el, i) => {
        el.classList.toggle('active', i === activeIndex);
        if (i === activeIndex) input.setAttribute('aria-activedescendant','sugg-' + i);
      });
      if (activeIndex < 0) input.removeAttribute('aria-activedescendant');
    }

    input.addEventListener('keydown', e => {
      const items = [...suggBox.querySelectorAll('.suggestion-item')];
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, items.length - 1);
        updateActive();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, -1);
        updateActive();
      } else if (e.key === 'Enter' && activeIndex >= 0) {
        e.preventDefault();
        items[activeIndex].dispatchEvent(new MouseEvent('mousedown'));
      } else if (e.key === 'Escape') {
        if (input.value) {
          input.value = '';
          hideSugg();
        } else {
          closeSearch();
          button.focus();
        }
      }
    });

    /* ─── Input com debounce ───────────────────────────────────────── */
    input.addEventListener('input', () => {
      clearTimeout(debounceId);
      const term = input.value.trim();
      if (!term) { hideSugg(); return; }
      debounceId = setTimeout(() => fetchSugg(term), 300);
    });

    /* ─── Submit ───────────────────────────────────────────────────── */
    form.addEventListener('submit', e => {
      e.preventDefault();
      if (!form.classList.contains('is-open')) { openSearch(); return; }
      const term = input.value.trim();
      if (!term) { input.focus(); return; }
      hideSugg();
      doSearch(term);
    });

    /* ─── Clique fora ──────────────────────────────────────────────── */
    document.addEventListener('pointerdown', e => {
      const wrapper = form.closest('.search-wrapper');
      if (wrapper && wrapper.contains(e.target)) return;
      if (!input.value.trim()) closeSearch();
      else hideSugg();
    });

  })();
  </script>
</body>
</html>
