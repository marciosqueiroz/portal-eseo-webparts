<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu superior e busca — Portal ESEO</title>
  <style>
    :root {
      --navy:  #0a2537;
      --cyan:  #0eb7d5;
      --red:   #e30613;
      --white: #ffffff;
      --line:  rgba(220, 229, 234, 0.45);
      --muted: #5e6c75;
    }

    * { box-sizing: border-box; }

    /* ✅ TRANSPARENTE + SEM BARRA DE ROLAGEM */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      scrollbar-width: none;          /* Firefox */
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar { display: none; } /* Chrome / Edge / Safari */

    .header {
      width: 100%;
      height: 100%;
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      padding: 0 clamp(24px, 3.2vw, 64px);
      border-bottom: 1px solid var(--line);
      background: transparent;
      overflow: visible; /* garante que o travessão não seja cortado */
    }

    /* ── MENU ─────────────────────────────────────────────── */
    .menu {
      display: flex;
      align-items: stretch;
      gap: clamp(28px, 4vw, 72px);
      height: 100%;
      overflow: visible; /* ✅ TRAVESSÃO NÃO CORTA em nenhuma largura */
    }

    .menu a {
      position: relative;
      display: flex;
      align-items: center;
      color: var(--navy);
      font-size: clamp(14px, 1.05vw, 18px);
      font-weight: 800;
      letter-spacing: .015em;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
      transition: color 180ms ease;
    }

    /* ✅ TRAVESSÃO (underline) ao passar o mouse — RESTAURADO E GARANTIDO */
    .menu a::after {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 4px;
      border-radius: 4px 4px 0 0;
      background: var(--cyan);
      content: "";
      opacity: 0;
      transform: scaleX(.3);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .menu a:hover,
    .menu a:focus-visible,
    .menu a[aria-current="page"] { color: #007f9e; }

    .menu a:hover::after,
    .menu a:focus-visible::after,
    .menu a[aria-current="page"]::after {
      opacity: 1;
      transform: scaleX(1);
    }

    /* ── SEARCH ───────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      flex: 0 0 auto;
    }

    .search {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
      border: 1px solid var(--navy);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 8px 22px rgba(10, 37, 55, .08);
      transition: width 260ms cubic-bezier(.2, .8, .2, 1),
                  border-color 180ms ease,
                  box-shadow 180ms ease;
    }

    .search.is-open,
    .search:focus-within {
      width: min(380px, 31vw);
      border-color: var(--cyan);
      box-shadow: 0 10px 26px rgba(10, 37, 55, .12);
    }

    .search__input {
      width: 0;
      min-width: 0;
      height: 48px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--navy);
      font: 650 15px/1 "Segoe UI", Arial, sans-serif;
      opacity: 0;
      pointer-events: none;
      transition: width 220ms ease, padding 220ms ease, opacity 140ms ease;
    }

    .search.is-open .search__input,
    .search:focus-within .search__input {
      width: calc(100% - 52px);
      padding: 0 4px 0 20px;
      opacity: 1;
      pointer-events: auto;
    }

    .search__input::placeholder { color: #74818a; }

    .search__button {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      flex: 0 0 48px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--navy);
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease;
    }

    .search__button:hover,
    .search__button:focus-visible {
      background: var(--navy);
      color: var(--white);
    }

    .search__button:focus-visible,
    .menu a:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 3px;
    }

    .search svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
    }

    /* ── DROPDOWN AUTOCOMPLETE ────────────────────────────── */
    /* position:fixed escapa do overflow:hidden do body/iframe */
    .suggestions {
      position: fixed;
      z-index: 99999;
      background: var(--white);
      border: 1.5px solid var(--cyan);
      border-radius: 14px;
      box-shadow: 0 14px 40px rgba(10, 37, 55, .18);
      list-style: none;
      margin: 0;
      padding: 5px 0;
      display: none;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--cyan) transparent;
      animation: sugg-in 150ms ease;
    }
    .suggestions.visible { display: block; }

    @keyframes sugg-in {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sug-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 15px;
      font-size: 13.5px;
      color: var(--navy);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: "Segoe UI", Arial, sans-serif;
      transition: background 100ms ease;
    }
    .sug-item:hover,
    .sug-item.active { background: #e8f9fc; color: #007f9e; }

    .sug-item svg {
      width: 14px; height: 14px;
      flex-shrink: 0;
      fill: none;
      stroke: var(--cyan);
      stroke-width: 2.2;
      stroke-linecap: round;
    }

    .sug-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sug-tag {
      font-size: 10px;
      color: var(--muted);
      background: #eef3f6;
      border-radius: 99px;
      padding: 2px 8px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .sug-footer {
      padding: 7px 15px 5px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid #edf3f6;
      margin-top: 4px;
      text-align: center;
    }

    /* ── ACESSIBILIDADE ───────────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ── RESPONSIVO ───────────────────────────────────────── */
    @media (max-width: 820px) {
      .header { gap: 14px; padding: 0 16px; }
      .menu   { gap: 18px; /* sem overflow:hidden — mantém o travessão */ }
      .menu a { font-size: 12px; }
      .search.is-open,
      .search:focus-within { width: min(300px, 45vw); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <header class="header">

    <!-- NAVEGAÇÃO -->
    <nav class="menu" aria-label="Navegação principal do Portal ESEO">
      <a data-page="home"
         href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta"
         target="_blank" rel="noopener noreferrer">Home</a>
      <a data-page="conheca"
         href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/Sobre-a-ESEO.aspx"
         target="_blank" rel="noopener noreferrer">Conheça a ESEO</a>
      <a data-page="oferta"
         href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/What's-happening.aspx"
         target="_blank" rel="noopener noreferrer">Oferta de cursos online</a>
    </nav>

    <!-- BUSCA COM AUTOCOMPLETE -->
    <div class="search-wrap">
      <form class="search" id="portalSearch" role="search">
        <label class="sr-only" for="siteSearch">Pesquisar no Portal ESEO</label>
        <input
          class="search__input"
          id="siteSearch"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="Pesquisar no Portal ESEO"
          aria-autocomplete="list"
          aria-controls="sugg"
          aria-expanded="false"
          role="combobox"
        >
        <button class="search__button" type="submit" aria-label="Abrir pesquisa no Portal ESEO">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10.8" cy="10.8" r="6.8"></circle>
            <path d="m16 16 4.2 4.2"></path>
          </svg>
        </button>
      </form>
      <ul class="suggestions" id="sugg" role="listbox" aria-label="Sugestões do Portal ESEO"></ul>
    </div>

  </header>

  <script>
  (function () {
    'use strict';

    var PORTAL = 'https://sesisenaisp.sharepoint.com/sites/ESEOConecta';

    /* ── BASE DE CONTEÚDO DO PORTAL ESEO ──────────────────────────
       Filtra instantaneamente (sem API, funciona de qualquer origem).
       Quando embutido no SharePoint, a busca live substitui esses
       resultados com dados reais do site.
    ─────────────────────────────────────────────────────────────── */
    var DB = [
      // Páginas principais
      { t:'Home — Portal ESEO',                           u:PORTAL,                                                             k:'Página'      },
      { t:'Sobre a ESEO',                                 u:PORTAL+'/SitePages/Sobre-a-ESEO.aspx',                              k:'Página'      },
      { t:'Oferta de Cursos Online',                      u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Página'      },

      // Monitoria e Tutoria
      { t:'Monitoria e Tutoria',                          u:PORTAL,                                                             k:'Página'      },
      { t:'Guia do Tutor — Sou tutor novo e agora',       u:PORTAL,                                                             k:'Documento'   },
      { t:'Manual do Monitor',                            u:PORTAL,                                                             k:'Documento'   },
      { t:'Regulamento de Tutoria',                       u:PORTAL,                                                             k:'Documento'   },
      { t:'Onboarding de Docentes EAD',                   u:PORTAL,                                                             k:'Documento'   },
      { t:'Base de Conhecimento — Monitores e Tutores',   u:PORTAL,                                                             k:'Documento'   },
      { t:'Relatório de Desempenho — Tutores',            u:PORTAL,                                                             k:'Relatório'   },

      // Cursos Técnicos
      { t:'Cursos Técnicos — Catálogo ESEO',              u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Catálogo'    },
      { t:'Curso Técnico em Administração',               u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Contabilidade',               u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Informática',                 u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Logística',                   u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Marketing',                   u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Recursos Humanos',            u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Segurança do Trabalho',       u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Desenvolvimento de Sistemas', u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Eletrotécnica',               u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Mecânica Industrial',         u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Automação Industrial',        u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Design Gráfico',              u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Redes de Computadores',       u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'Curso Técnico em Qualidade',                   u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },

      // Cursos FIC
      { t:'Cursos FIC — Formação Inicial e Continuada',   u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Catálogo'    },
      { t:'FIC — Programação Web',                        u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'FIC — Excel do Básico ao Avançado',            u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'FIC — Excel para Deficientes Visuais',         u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'FIC — Gestão de Projetos',                     u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'FIC — Inteligência Artificial Aplicada',       u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'FIC — Marketing Digital',                      u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },
      { t:'FIC — Empreendedorismo',                       u:PORTAL+"/SitePages/What's-happening.aspx",                          k:'Curso'       },

      // EJA
      { t:'EJA Profissionalizante — ESEO',                u:PORTAL,                                                             k:'Programa'    },
      { t:'EJA — Educação de Jovens e Adultos',           u:PORTAL,                                                             k:'Programa'    },
      { t:'Material EJA — Monitores e Tutores',           u:PORTAL,                                                             k:'Documento'   },

      // Programas e Processos
      { t:'Programa Dimensão 360',                        u:PORTAL,                                                             k:'Programa'    },
      { t:'AQV — Avaliação de Qualidade e Validação',     u:PORTAL,                                                             k:'Processo'    },
      { t:'Fluxo de Desenvolvimento de Cursos',           u:PORTAL,                                                             k:'Processo'    },
      { t:'Formulário de Solicitação de Curso',           u:PORTAL,                                                             k:'Formulário'  },

      // Calendários e Informativos
      { t:'Calendário Acadêmico',                         u:PORTAL,                                                             k:'Calendário'  },
      { t:'Cronograma de Lançamento de Cursos',           u:PORTAL,                                                             k:'Calendário'  },
      { t:'Boletim ESEO — Newsletter',                    u:PORTAL,                                                             k:'Informativo' },

      // Acesso e Suporte
      { t:'Acesso ao AVA — Ambiente Virtual',             u:PORTAL,                                                             k:'Acesso'      },
      { t:'Fale Conosco — Central de Atendimento ESEO',   u:PORTAL,                                                             k:'Contato'     },
      { t:'Acessibilidade — Recursos para alunos',        u:PORTAL,                                                             k:'Página'      },
      { t:'Política de Privacidade da ESEO',              u:PORTAL,                                                             k:'Documento'   },
    ];

    /* ── Elementos ── */
    var form  = document.getElementById('portalSearch');
    var input = document.getElementById('siteSearch');
    var btn   = form.querySelector('.search__button');
    var sugg  = document.getElementById('sugg');
    var links = [].slice.call(document.querySelectorAll('[data-page]'));

    /* ── Página ativa ── */
    var params = new URLSearchParams(location.search);
    var info   = (params.get('ativa') || '').toLowerCase();
    var ref    = (document.referrer || '').toLowerCase();
    var cur    = ['home','conheca','oferta'].indexOf(info) > -1 ? info
               : ref.indexOf('sobre-a-eseo') > -1 ? 'conheca'
               : (ref.indexOf("what%27s-happening") > -1 || ref.indexOf("what's-happening") > -1) ? 'oferta'
               : 'home';
    links.forEach(function (l) {
      if (l.dataset.page === cur) l.setAttribute('aria-current', 'page');
    });

    /* ── Normaliza string para busca sem acento ── */
    function norm(s) {
      return String(s).toLowerCase()
             .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    /* ── Posiciona dropdown via fixed (funciona dentro de iframe) ── */
    function position() {
      var r = form.getBoundingClientRect();
      var below = window.innerHeight - r.bottom - 10;
      var above = r.top - 10;

      if (below >= 80 || below >= above) {
        sugg.style.top    = (r.bottom + 8) + 'px';
        sugg.style.bottom = 'auto';
        sugg.style.maxHeight = Math.max(below - 4, 80) + 'px';
      } else {
        sugg.style.bottom = (window.innerHeight - r.top + 8) + 'px';
        sugg.style.top    = 'auto';
        sugg.style.maxHeight = Math.max(above - 4, 80) + 'px';
      }

      sugg.style.right = (window.innerWidth - r.right) + 'px';
      sugg.style.width = Math.max(r.width, 260) + 'px';
    }

    /* ── Estado ── */
    var activeIdx = -1;
    var debounce  = null;

    /* ── Esconde dropdown ── */
    function hide() {
      sugg.classList.remove('visible');
      sugg.innerHTML = '';
      input.setAttribute('aria-expanded', 'false');
      activeIdx = -1;
    }

    /* ── Abre campo de busca ── */
    function openSearch() {
      form.classList.add('is-open');
      btn.setAttribute('aria-label', 'Pesquisar no Portal ESEO');
      setTimeout(function () { input.focus(); }, 180);
    }

    /* ── Fecha campo de busca ── */
    function closeSearch() {
      form.classList.remove('is-open');
      btn.setAttribute('aria-label', 'Abrir pesquisa no Portal ESEO');
      hide();
    }

    /* ── Abre busca completa no SharePoint ── */
    function doSearch(term) {
      if (!term) return;
      var q = term + ' Path:"' + PORTAL + '"';
      window.open(
        PORTAL + '/_layouts/15/search.aspx/siteall?q=' + encodeURIComponent(q),
        '_blank', 'noopener,noreferrer'
      );
    }

    /* ── Renderiza lista de sugestões ── */
    function render(items) {
      sugg.innerHTML = '';
      activeIdx = -1;

      if (!items.length) { hide(); return; }

      position();

      items.forEach(function (item, i) {
        var li = document.createElement('li');
        li.setAttribute('role', 'option');
        li.id = 'si' + i;
        li.className = 'sug-item';
        li.innerHTML =
          '<svg viewBox="0 0 24 24" aria-hidden="true">' +
            '<circle cx="10.8" cy="10.8" r="6.8"/>' +
            '<path d="m16 16 4.2 4.2"/>' +
          '</svg>' +
          '<span class="sug-label">' + item.t.replace(/</g,'&lt;') + '</span>' +
          '<span class="sug-tag">'   + item.k + '</span>';

        li.addEventListener('mousedown', function (e) {
          e.preventDefault();
          window.open(item.u, '_blank', 'noopener,noreferrer');
          hide();
        });

        sugg.appendChild(li);
      });

      var ft = document.createElement('li');
      ft.setAttribute('role', 'presentation');
      ft.className = 'sug-footer';
      ft.textContent = '🔒 Conteúdo restrito ao Portal ESEO';
      sugg.appendChild(ft);

      sugg.classList.add('visible');
      input.setAttribute('aria-expanded', 'true');
    }

    /* ── Busca: estática (instantânea) + live SP quando autenticado ── */
    function search(term) {
      if (!term || term.length < 2) { hide(); return; }

      /* 1) Resultado imediato da base estática */
      var q    = norm(term);
      var hits = DB.filter(function (d) { return norm(d.t).indexOf(q) > -1; }).slice(0, 8);
      render(hits);

      /* 2) Tenta busca live no SP (funciona somente dentro do SharePoint com sessão ativa) */
      var kw  = encodeURIComponent("'" + term + "* Path:" + PORTAL + "'");
      var sel = encodeURIComponent('Title,Path');
      fetch(
        PORTAL + '/_api/search/query?querytext=' + kw +
          '&rowlimit=8&selectproperties=' + sel + '&trimduplicates=true',
        { credentials: 'include', headers: { Accept: 'application/json;odata=verbose' } }
      )
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(function (data) {
        var rows = (((((data||{}).d||{}).query||{}).PrimaryQueryResult||{})
                       .RelevantResults||{}).Table||{}).Rows||{}).results || [];
        var live = rows.map(function (row) {
          var title='', path='';
          ((row.Cells||{}).results||[]).forEach(function (c) {
            if (c.Key==='Title') title = c.Value||'';
            if (c.Key==='Path')  path  = c.Value||'';
          });
          var k = path.indexOf('/SitePages/')>-1 ? 'Página'
                : /\.pdf$/i.test(path)  ? 'PDF'
                : /\.docx?$/i.test(path)? 'Word'
                : /\.xlsx?$/i.test(path)? 'Excel'
                : 'Documento';
          return { t: title || path.split('/').pop(), u: path, k: k };
        }).filter(function (i) { return i.t && i.u; });

        if (live.length) render(live); /* substitui resultado estático pelos dados reais */
      })
      .catch(function () { /* silencia CORS/erro — mantém resultado estático */ });
    }

    /* ── Navegação por teclado ── */
    function setActive() {
      var items = sugg.querySelectorAll('.sug-item');
      [].forEach.call(items, function (el, i) {
        el.classList.toggle('active', i === activeIdx);
      });
      if (activeIdx >= 0) input.setAttribute('aria-activedescendant','si'+activeIdx);
      else                input.removeAttribute('aria-activedescendant');
    }

    input.addEventListener('keydown', function (e) {
      var items = sugg.querySelectorAll('.sug-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
        setActive();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, -1);
        setActive();
      } else if (e.key === 'Enter' && activeIdx >= 0) {
        e.preventDefault();
        items[activeIdx].dispatchEvent(new MouseEvent('mousedown'));
      } else if (e.key === 'Escape') {
        if (input.value) { input.value = ''; hide(); }
        else             { closeSearch(); btn.focus(); }
      }
    });

    /* ── Input com debounce ── */
    input.addEventListener('input', function () {
      clearTimeout(debounce);
      var term = input.value.trim();
      if (!term) { hide(); return; }
      debounce = setTimeout(function () { search(term); }, 200);
    });

    /* ── Submit ── */
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!form.classList.contains('is-open')) { openSearch(); return; }
      var term = input.value.trim();
      if (!term) { input.focus(); return; }
      hide();
      doSearch(term);
    });

    /* ── Clique fora fecha o dropdown ── */
    document.addEventListener('pointerdown', function (e) {
      var wrap = document.querySelector('.search-wrap');
      if (wrap && wrap.contains(e.target)) return;
      if (!input.value.trim()) closeSearch();
      else hide();
    });

  })();
  </script>
</body>
</html>
