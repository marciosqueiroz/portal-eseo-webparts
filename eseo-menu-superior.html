<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu superior e busca — Portal ESEO</title>
  <style>
    :root {
      --navy: #0a2537;
      --cyan: #0eb7d5;
      --red: #e30613;
      --white: #ffffff;
      --line: #dce5ea;
      --muted: #5e6c75;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--white);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .header {
      width: 100%;
      height: 100%;
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      padding: 0 clamp(24px, 3.2vw, 64px);
      border-bottom: 1px solid var(--line);
      background: var(--white);
    }

    .menu {
      display: flex;
      align-items: stretch;
      gap: clamp(28px, 4vw, 72px);
      height: 100%;
    }

    .menu a {
      position: relative;
      display: flex;
      align-items: center;
      color: var(--navy);
      font-size: clamp(14px, 1.05vw, 18px);
      font-weight: 800;
      letter-spacing: .015em;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
      transition: color 180ms ease;
    }

    .menu a::after {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 4px;
      border-radius: 4px 4px 0 0;
      background: var(--cyan);
      content: "";
      opacity: 0;
      transform: scaleX(.3);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .menu a:hover,
    .menu a:focus-visible,
    .menu a[aria-current="page"] {
      color: #007f9e;
    }

    .menu a:hover::after,
    .menu a:focus-visible::after,
    .menu a[aria-current="page"]::after {
      opacity: 1;
      transform: scaleX(1);
    }

    .search {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid var(--navy);
      border-radius: 999px;
      background: var(--white);
      box-shadow: 0 8px 22px rgba(10, 37, 55, .08);
      transition: width 260ms cubic-bezier(.2, .8, .2, 1),
                  border-color 180ms ease,
                  box-shadow 180ms ease;
    }

    .search.is-open,
    .search:focus-within {
      width: min(380px, 31vw);
      border-color: var(--cyan);
      box-shadow: 0 10px 26px rgba(10, 37, 55, .12);
    }

    .search__input {
      width: 0;
      min-width: 0;
      height: 48px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--navy);
      font: 650 15px/1 "Segoe UI", Arial, sans-serif;
      opacity: 0;
      pointer-events: none;
      transition: width 220ms ease, padding 220ms ease, opacity 140ms ease;
    }

    .search.is-open .search__input,
    .search:focus-within .search__input {
      width: calc(100% - 52px);
      padding: 0 4px 0 20px;
      opacity: 1;
      pointer-events: auto;
    }

    .search__input::placeholder { color: #74818a; }

    .search__button {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      flex: 0 0 48px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--navy);
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease;
    }

    .search__button:hover,
    .search__button:focus-visible {
      background: var(--navy);
      color: var(--white);
    }

    .search__button:focus-visible,
    .menu a:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 3px;
    }

    .search svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 820px) {
      .header { gap: 14px; padding: 0 16px; }
      .menu { gap: 18px; overflow: hidden; }
      .menu a { font-size: 12px; }
      .search.is-open,
      .search:focus-within { width: min(300px, 45vw); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="menu" aria-label="Navegação principal do Portal ESEO">
      <a
        data-page="home"
        href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta"
        target="_blank"
        rel="noopener noreferrer"
      >Home</a>
      <a
        data-page="conheca"
        href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/Sobre-a-ESEO.aspx"
        target="_blank"
        rel="noopener noreferrer"
      >Conheça a ESEO</a>
      <a
        data-page="oferta"
        href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/What's-happening.aspx"
        target="_blank"
        rel="noopener noreferrer"
      >Oferta de cursos online</a>
    </nav>

    <form class="search" id="portalSearch" role="search">
      <label class="sr-only" for="siteSearch">Pesquisar no Portal ESEO</label>
      <input
        class="search__input"
        id="siteSearch"
        type="search"
        autocomplete="off"
        placeholder="Pesquisar no Portal ESEO"
      >
      <button class="search__button" type="submit" aria-label="Abrir pesquisa no Portal ESEO">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.8" cy="10.8" r="6.8"></circle>
          <path d="m16 16 4.2 4.2"></path>
        </svg>
      </button>
    </form>
  </header>

  <script>
    (function () {
      const PORTAL_BASE = "https://sesisenaisp.sharepoint.com/sites/ESEOConecta";
      const params = new URLSearchParams(location.search);
      const informedPage = (params.get("ativa") || "").toLowerCase();
      const referrer = (document.referrer || "").toLowerCase();
      const links = [...document.querySelectorAll("[data-page]")];
      const form = document.getElementById("portalSearch");
      const input = document.getElementById("siteSearch");
      const button = form.querySelector(".search__button");

      let currentPage = ["home", "conheca", "oferta"].includes(informedPage)
        ? informedPage
        : referrer.includes("sobre-a-eseo")
          ? "conheca"
          : referrer.includes("what%27s-happening") || referrer.includes("what's-happening")
            ? "oferta"
            : "home";

      links.forEach(function (link) {
        if (link.dataset.page === currentPage) {
          link.setAttribute("aria-current", "page");
        }
      });

      function openSearch() {
        form.classList.add("is-open");
        button.setAttribute("aria-label", "Pesquisar no Portal ESEO");
        window.setTimeout(function () { input.focus(); }, 180);
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        if (!form.classList.contains("is-open")) {
          openSearch();
          return;
        }

        const term = input.value.trim();
        if (!term) {
          input.focus();
          return;
        }

        const scopedQuery = term + ' Path:"' + PORTAL_BASE + '"';
        const destination =
          PORTAL_BASE + "/_layouts/15/search.aspx/siteall?q=" +
          encodeURIComponent(scopedQuery);
        window.open(destination, "_blank", "noopener,noreferrer");
      });

      document.addEventListener("pointerdown", function (event) {
        if (!form.contains(event.target) && !input.value.trim()) {
          form.classList.remove("is-open");
          button.setAttribute("aria-label", "Abrir pesquisa no Portal ESEO");
        }
      });

      input.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && !input.value) {
          form.classList.remove("is-open");
          button.focus();
        }
      });
    })();
  </script>
</body>
</html>
