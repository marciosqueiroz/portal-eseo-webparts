<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atalhos minimalistas — Portal ESEO</title>

  <style>
    :root {
      --eseo-navy: #061923;
      --eseo-blue: #1d728f;
      --eseo-cyan: #0eb7d5;
      --eseo-white: #ffffff;
      --eseo-muted: rgba(255,255,255,.80);
      --eseo-focus: #79d9ff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 116px;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: transparent !important;
      color: var(--eseo-white);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body { padding: 8px 7px 4px; }

    .quick-area {
      width: min(100%, 1480px);
      margin: 0 auto;
    }

    .quick-links {
      width: min(100%, 920px);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-left: auto;
    }

    .quick-link {
      min-width: 0;
      min-height: 64px;
      display: grid;
      grid-template-columns: 27px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border: 0;
      border-radius: 7px;
      background:
        linear-gradient(
          125deg,
          rgba(6,25,35,.78),
          rgba(29,114,143,.40)
        );
      box-shadow:
        0 9px 24px rgba(3,20,31,.26),
        0 0 21px rgba(29,114,143,.12);
      color: var(--eseo-white);
      text-decoration: none;
      text-shadow: 0 2px 7px rgba(0,0,0,.66);
      backdrop-filter: blur(10px) saturate(112%);
      -webkit-backdrop-filter: blur(10px) saturate(112%);
      transition:
        background 180ms ease,
        box-shadow 180ms ease,
        transform 180ms ease;
    }

    .quick-link:hover,
    .quick-link:focus-visible {
      background:
        linear-gradient(
          125deg,
          rgba(6,25,35,.92),
          rgba(29,114,143,.68)
        );
      box-shadow:
        0 12px 29px rgba(3,20,31,.32),
        0 0 26px rgba(14,183,213,.19);
      transform: translateY(-2px);
    }

    .quick-link:focus-visible {
      outline: 3px solid var(--eseo-focus);
      outline-offset: 3px;
    }

    .quick-link__icon {
      width: 27px;
      height: 27px;
      display: grid;
      place-items: center;
      color: var(--eseo-cyan);
      transition: color 180ms ease, transform 180ms ease;
    }

    .quick-link:hover .quick-link__icon,
    .quick-link:focus-visible .quick-link__icon {
      color: var(--eseo-white);
      transform: scale(1.07);
    }

    .quick-link__icon svg {
      width: 25px;
      height: 25px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.85;
    }

    .quick-link__title {
      overflow: hidden;
      font-size: clamp(10.5px, .82vw, 13px);
      font-weight: 850;
      letter-spacing: .012em;
      line-height: 1.15;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .quick-description {
      width: min(100%, 920px);
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin: 4px 0 0 auto;
      padding: 0 5px;
      color: var(--eseo-muted);
      font-size: 11.5px;
      line-height: 1.25;
      text-align: right;
      text-shadow: 0 2px 8px rgba(0,0,0,.82);
      opacity: 0;
      transform: translateY(-3px);
      transition: opacity 160ms ease, transform 180ms ease;
    }

    .quick-description.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .quick-description__label {
      color: var(--eseo-cyan);
      font-size: 9.5px;
      font-weight: 900;
      letter-spacing: .10em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      html, body { min-height: 178px; }
      .quick-links { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .quick-link { min-height: 57px; }
      .quick-description {
        justify-content: center;
        min-height: 30px;
        text-align: center;
      }
    }

    @media (max-width: 390px) {
      html, body { min-height: 298px; }
      .quick-links { grid-template-columns: 1fr; }
      .quick-description { align-items: flex-start; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; }
    }
  </style>
</head>

<body>
  <section class="quick-area">
    <nav class="quick-links" aria-label="Atalhos do Portal ESEO">
      <a
        class="quick-link"
        href="https://app.powerbi.com/view?r=eyJrIjoiYzk1MzhjNWQtYTZlMy00ZmY4LWFiM2MtZGMxZjRlMzJiNDA3IiwidCI6IjQxNDhhNmRlLTBkZDEtNGQwNC1hNGM1LTc4ZTM3NGU0ZjZkNiIsImMiOjR9&amp;pageName=ReportSection811927fa7d0805d7a097"
        target="_blank"
        rel="noopener noreferrer"
        data-label="Explore"
        data-description="Consulte cursos, formatos e informações do catálogo EAD."
        aria-describedby="quickDescription"
      >
        <span class="quick-link__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M3 8.5 12 4l9 4.5-9 4.5-9-4.5Z"></path>
            <path d="M6.5 10.5v4.2c2.9 2.2 8.1 2.2 11 0v-4.2"></path>
            <path d="M21 8.5v5"></path>
          </svg>
        </span>
        <span class="quick-link__title">Portfólio de cursos</span>
      </a>

      <a
        class="quick-link"
        href="https://forms.office.com/pages/responsepage.aspx?id=3qZIQdENBE2kxXjjdOT21kx71JN6hW5Mh8ztNWPFnzFUQUVTNDNQNEhDVkFRODFPUkdJWTlPSzNZMS4u"
        target="_blank"
        rel="noopener noreferrer"
        data-label="Solicite"
        data-description="Peça a liberação de uma turma no SGSET."
        aria-describedby="quickDescription"
      >
        <span class="quick-link__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="9" width="16" height="11" rx="2.5"></rect>
            <path d="M8 9V6.5A4.5 4.5 0 0 1 16.2 4"></path>
          </svg>
        </span>
        <span class="quick-link__title">Liberar turma SGSET</span>
      </a>

      <a
        class="quick-link"
        href="https://outlook.office.com/mail/deeplink/compose?to=eadempresas%40sp.senai.br"
        target="_blank"
        rel="noopener noreferrer"
        data-label="Construa"
        data-description="Solicite novos cursos e ofertas personalizadas."
        aria-describedby="quickDescription"
      >
        <span class="quick-link__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="m12 3 2.65 5.37 5.93.86-4.29 4.18 1.01 5.91L12 16.53l-5.3 2.79 1.01-5.91-4.29-4.18 5.93-.86L12 3Z"></path>
          </svg>
        </span>
        <span class="quick-link__title">Soluções EAD</span>
      </a>

      <a
        class="quick-link"
        href="https://outlook.office.com/mail/deeplink/compose?to=rantonio%40sp.senai.br"
        target="_blank"
        rel="noopener noreferrer"
        data-label="Conecte"
        data-description="Solicite uma ação da ESEO em parceria com a AQV."
        aria-describedby="quickDescription"
      >
        <span class="quick-link__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M3.5 19v-1.4A4.6 4.6 0 0 1 8.1 13h1.8a4.6 4.6 0 0 1 4.6 4.6V19"></path>
            <circle cx="17" cy="9" r="2.3"></circle>
            <path d="M16.3 14.1h1.2A3.5 3.5 0 0 1 21 17.6V19"></path>
          </svg>
        </span>
        <span class="quick-link__title">Parceria AQV ESEO</span>
      </a>
    </nav>

    <p class="quick-description" id="quickDescription" aria-live="polite">
      <span class="quick-description__label" id="descriptionLabel"></span>
      <span id="descriptionText"></span>
    </p>
  </section>

  <script>
    (function () {
      const links = Array.from(document.querySelectorAll(".quick-link"));
      const description = document.getElementById("quickDescription");
      const label = document.getElementById("descriptionLabel");
      const text = document.getElementById("descriptionText");

      function show(link) {
        label.textContent = link.dataset.label;
        text.textContent = link.dataset.description;
        description.classList.add("is-visible");
      }

      function hide() {
        if (document.activeElement && document.activeElement.classList.contains("quick-link")) return;
        description.classList.remove("is-visible");
      }

      links.forEach(function (link) {
        link.addEventListener("mouseenter", function () { show(link); });
        link.addEventListener("focus", function () { show(link); });
        link.addEventListener("mouseleave", hide);
        link.addEventListener("blur", function () {
          window.setTimeout(hide, 0);
        });
      });
    }());
  </script>
</body>
</html>
