<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atalhos — Portal ESEO</title>
  <style>
    :root {
      --navy: #0a2537;
      --cyan: #0eb7d5;
      --red: #e30613;
      --white: #ffffff;
      --line: #d9e3e8;
      --muted: #5e6d76;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .shortcuts {
      width: 100%;
      height: 100%;
      min-height: 136px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      background: var(--white);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .shortcut {
      position: relative;
      min-width: 0;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 24px;
      align-items: center;
      gap: 14px;
      padding: 20px clamp(18px, 2vw, 34px);
      overflow: hidden;
      color: var(--navy);
      text-decoration: none;
      background: transparent;
      transition: color 180ms ease, background 180ms ease;
    }

    .shortcut + .shortcut { border-left: 1px solid var(--line); }

    .shortcut::before {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      height: 4px;
      background: var(--cyan);
      content: "";
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 220ms ease;
    }

    .shortcut:hover,
    .shortcut:focus-visible {
      background: #f6fafb;
    }

    .shortcut:hover::before,
    .shortcut:focus-visible::before {
      transform: scaleX(1);
    }

    .shortcut:focus-visible {
      z-index: 2;
      outline: 3px solid var(--cyan);
      outline-offset: -3px;
    }

    .shortcut__icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(10, 37, 55, .2);
      border-radius: 50%;
      color: var(--navy);
      transition: border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .shortcut:hover .shortcut__icon,
    .shortcut:focus-visible .shortcut__icon {
      border-color: var(--cyan);
      color: #0086a5;
      transform: translateY(-2px);
    }

    .shortcut__icon svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .shortcut__copy {
      position: relative;
      min-width: 0;
      height: 58px;
      display: flex;
      align-items: center;
    }

    .shortcut__title,
    .shortcut__description {
      position: absolute;
      inset-inline: 0;
      margin: 0;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .shortcut__title {
      color: var(--navy);
      font-size: clamp(13px, .95vw, 16px);
      font-weight: 850;
      line-height: 1.22;
      letter-spacing: .015em;
      text-transform: uppercase;
    }

    .shortcut__description {
      color: var(--muted);
      font-size: clamp(12px, .85vw, 14px);
      font-weight: 600;
      line-height: 1.35;
      opacity: 0;
      transform: translateY(10px);
    }

    .shortcut:hover .shortcut__title,
    .shortcut:focus-visible .shortcut__title {
      opacity: 0;
      transform: translateY(-10px);
    }

    .shortcut:hover .shortcut__description,
    .shortcut:focus-visible .shortcut__description {
      opacity: 1;
      transform: translateY(0);
    }

    .shortcut__arrow {
      color: #829099;
      font-size: 22px;
      line-height: 1;
      transition: color 180ms ease, transform 180ms ease;
    }

    .shortcut:hover .shortcut__arrow,
    .shortcut:focus-visible .shortcut__arrow {
      color: var(--cyan);
      transform: translate(3px, -3px);
    }

    @media (max-width: 900px) {
      .shortcuts { grid-template-columns: repeat(2, 1fr); min-height: 272px; }
      .shortcut:nth-child(3) { border-left: 0; border-top: 1px solid var(--line); }
      .shortcut:nth-child(4) { border-top: 1px solid var(--line); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
