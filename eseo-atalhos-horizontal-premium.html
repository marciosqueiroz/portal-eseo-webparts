<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atalhos premium — Portal ESEO</title>

  <style>
    :root {
      --eseo-navy: #061923;
      --eseo-blue: #1d728f;
      --eseo-cyan: #0eb7d5;
      --eseo-red: #e30613;
      --eseo-white: #ffffff;
      --eseo-muted: #d6e1e6;
      --eseo-focus: #79d9ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 150px;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: transparent !important;
      background-color: rgba(0, 0, 0, 0) !important;
      color-scheme: normal;
      color: var(--eseo-white);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      padding: 11px 8px 14px;
    }

    .quick-links {
      width: min(100%, 1480px);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(12px, 1.3vw, 20px);
      margin: 0 auto;
    }

    .quick-link {
      position: relative;
      min-width: 0;
      min-height: 126px;
      display: block;
      overflow: hidden;
      border: 0;
      border-radius: 14px;
      background:
        linear-gradient(
          145deg,
          rgba(4, 19, 29, 0.77),
          rgba(10, 37, 55, 0.52)
        );
      box-shadow:
        0 15px 34px rgba(0, 0, 0, 0.22),
        0 4px 12px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
      color: var(--eseo-white);
      text-decoration: none;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.72);
      isolation: isolate;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      transition:
        background 220ms ease,
        box-shadow 220ms ease,
        transform 220ms ease;
    }

    /* Faixa luminosa: substitui a borda tradicional. */
    .quick-link::after {
      position: absolute;
      top: 17px;
      bottom: 17px;
      left: 0;
      z-index: 3;
      width: 4px;
      border-radius: 0 99px 99px 0;
      content: "";
      background: linear-gradient(
        180deg,
        var(--eseo-cyan) 0%,
        #55d8ea 55%,
        var(--eseo-red) 100%
      );
      box-shadow: 3px 0 15px rgba(14, 183, 213, 0.36);
      opacity: 0.82;
      transform: scaleY(0.58);
      transition:
        opacity 220ms ease,
        transform 220ms ease;
    }

    .quick-link::before {
      position: absolute;
      inset: 0;
      z-index: -1;
      content: "";
      background:
        radial-gradient(
          circle at 18% 0,
          rgba(14, 183, 213, 0.3),
          transparent 46%
        ),
        linear-gradient(
          135deg,
          rgba(6, 25, 35, 0.91),
          rgba(29, 114, 143, 0.58)
        );
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .quick-link:hover,
    .quick-link:focus-visible {
      box-shadow:
        0 22px 46px rgba(0, 0, 0, 0.3),
        0 7px 18px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transform: translateY(-5px);
    }

    .quick-link:hover::before,
    .quick-link:focus-visible::before {
      opacity: 1;
    }

    .quick-link:hover::after,
    .quick-link:focus-visible::after {
      opacity: 1;
      transform: scaleY(1);
    }

    .quick-link:focus-visible {
      outline: 3px solid var(--eseo-focus);
      outline-offset: 3px;
    }

    .quick-link__front {
      position: absolute;
      inset: 14px 18px 15px;
      z-index: 2;
      pointer-events: none;
    }

    .quick-link__icon {
      position: absolute;
      top: 3px;
      left: 50%;
      width: 47px;
      height: 47px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.085);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 8px 20px rgba(0, 0, 0, 0.13);
      transform: translateX(-50%);
      transition:
        background 220ms ease,
        opacity 180ms ease,
        transform 220ms ease;
    }

    .quick-link__icon svg {
      width: 27px;
      height: 27px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.85;
    }

    .quick-link__title {
      position: absolute;
      right: 0;
      bottom: 1px;
      left: 0;
      display: block;
      overflow: hidden;
      color: var(--eseo-white);
      font-size: clamp(13px, 0.95vw, 16px);
      font-weight: 850;
      letter-spacing: 0.012em;
      line-height: 1.15;
      text-align: center;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .quick-link__description {
      position: absolute;
      top: 25px;
      right: 23px;
      left: 23px;
      z-index: 4;
      display: grid;
      place-items: center;
      color: var(--eseo-muted);
      font-size: clamp(12px, 0.82vw, 14px);
      font-weight: 650;
      line-height: 1.28;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(7px);
      transition:
        opacity 180ms ease,
        transform 220ms ease;
    }

    .quick-link__description span {
      display: block;
    }

    .quick-link__description strong {
      display: block;
      margin-bottom: 3px;
      color: #67e1f3;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .quick-link:hover .quick-link__icon,
    .quick-link:focus-visible .quick-link__icon {
      background: rgba(255, 255, 255, 0.04);
      opacity: 0.12;
      transform: translate(-50%, -8px) scale(0.86);
    }

    .quick-link:hover .quick-link__description,
    .quick-link:focus-visible .quick-link__description {
      opacity: 1;
      transform: translateY(0);
    }

    .quick-link__arrow {
      position: absolute;
      top: 13px;
      right: 13px;
      z-index: 5;
      width: 29px;
      height: 29px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.075);
      color: rgba(255, 255, 255, 0.86);
      font-size: 17px;
      font-weight: 350;
      line-height: 1;
      transition:
        background 220ms ease,
        color 220ms ease,
        transform 220ms ease;
    }

    .quick-link:hover .quick-link__arrow,
    .quick-link:focus-visible .quick-link__arrow {
      background: var(--eseo-cyan);
      color: var(--eseo-navy);
      transform: translate(2px, -2px);
    }

    @media (max-width: 900px) {
      html,
      body {
        min-height: 282px;
      }

      .quick-links {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px) {
      html,
      body {
        min-height: 550px;
      }

      .quick-links {
        grid-template-columns: 1fr;
      }

      .quick-link__title {
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
