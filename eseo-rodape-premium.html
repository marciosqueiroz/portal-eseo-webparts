<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rodapé — Portal ESEO</title>

  <style>
    :root {
      --navy: #0A2537;
      --blue: #1D728F;
      --cyan: #0EB7D5;
      --red: #E30613;
      --black: #000000;
      --gray: #878787;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 170px;
      margin: 0;
      background: var(--white);
      color: var(--navy);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .footer {
      position: relative;
      width: 100%;
      min-height: 170px;
      display: grid;
      grid-template-columns: minmax(330px, 1fr) auto;
      align-items: center;
      gap: clamp(40px, 7vw, 120px);
      padding: 28px clamp(26px, 8vw, 150px);
      border-top: 1px solid #DFE7EA;
      background: var(--white);
    }

    .footer::before {
      position: absolute;
      top: -1px;
      left: clamp(26px, 8vw, 150px);
      width: 90px;
      height: 4px;
      border-radius: 0 0 4px 4px;
      content: "";
      background: linear-gradient(90deg, var(--cyan), var(--red));
    }

    .contact__title {
      margin: 0 0 8px;
      color: var(--navy);
      font-size: clamp(17px, 1.5vw, 21px);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: .01em;
    }

    .contact__line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 9px;
      margin: 0;
      color: #324552;
      font-size: clamp(15px, 1.25vw, 18px);
      line-height: 1.45;
    }

    .contact__phone {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: inherit;
      text-decoration: none;
    }

    .contact__phone:hover { color: var(--blue); text-decoration: underline; text-underline-offset: 4px; }

    .contact__phone svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .contact__separator { color: var(--gray); }

    .social {
      display: grid;
      grid-template-columns: repeat(4, minmax(76px, 1fr));
      align-items: start;
      gap: clamp(14px, 2.2vw, 30px);
    }

    .social__link {
      position: relative;
      min-width: 76px;
      display: grid;
      justify-items: center;
      gap: 6px;
      padding: 5px 4px 9px;
      border-radius: 12px;
      color: var(--black);
      text-decoration: none;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .social__link::after {
      position: absolute;
      right: 50%;
      bottom: 0;
      left: 50%;
      height: 3px;
      border-radius: 99px;
      content: "";
      background: var(--red);
      transition: right 180ms ease, left 180ms ease;
    }

    .social__link:hover,
    .social__link:focus-visible {
      background: #F1F8FA;
      color: var(--blue);
      transform: translateY(-3px);
    }

    .social__link:hover::after,
    .social__link:focus-visible::after { right: 18px; left: 18px; }

    .social__link:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 3px;
    }

    .social__icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
    }

    .social__icon img {
      width: 58px;
      height: 58px;
      display: block;
      object-fit: contain;
    }

    .social__fallback {
      width: 58px;
      height: 58px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .social__fallback[hidden] { display: none; }

    .social__label {
      color: inherit;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.15;
      text-align: center;
    }

    @media (max-width: 860px) {
      .footer {
        grid-template-columns: 1fr;
        gap: 28px;
        padding-block: 34px;
      }
      .social { justify-self: start; }
    }

    @media (max-width: 500px) {
      .footer { padding-inline: 20px; }
      .social {
        width: 100%;
        grid-template-columns: repeat(2, 1fr);
      }
      .contact__separator { display: none; }
      .contact__line { align-items: flex-start; flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; }
    }
  </style>
</head>

  <script>
    document.querySelectorAll(".social__icon img").forEach(function (image) {
      image.addEventListener("error", function () {
        image.hidden = true;
        const fallback = image.nextElementSibling;
        if (fallback) fallback.hidden = false;
      });
    });
  </script>
