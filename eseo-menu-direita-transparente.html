<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu do Portal ESEO</title>
  <style>
    :root {
      --branco: #ffffff;
      --amarelo: #ffc600;
      --foco: #58c7ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .menu {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: flex-end;
      gap: clamp(30px, 4.2vw, 68px);
      padding: 8px clamp(24px, 4vw, 64px) 8px 12px;
      white-space: nowrap;
    }

    .menu a {
      position: relative;
      display: inline-flex;
      min-height: 54px;
      align-items: center;
      justify-content: center;
      color: var(--branco);
      font-size: clamp(20px, 1.05vw, 20px);
      font-weight: 800;
      line-height: 1.2;
      text-decoration: none;
      text-transform: uppercase;
      transition: color 180ms ease;
    }

    .menu a::after {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 4px;
      border-radius: 3px 3px 0 0;
      content: "";
      background: var(--amarelo);
      opacity: 0;
      transform: scaleX(.35);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .menu a:hover,
    .menu a:focus-visible,
    .menu a.ativo {
      color: var(--amarelo);
    }

    .menu a:hover::after,
    .menu a:focus-visible::after {
      opacity: 1;
      transform: scaleX(1);
    }

    .menu a:focus-visible {
      border-radius: 3px;
      outline: 3px solid var(--foco);
      outline-offset: 4px;
    }

    @media (max-width: 760px) {
      .menu {
        gap: 20px;
        padding-right: 18px;
      }

      .menu a {
        font-size: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <nav class="menu" aria-label="Navegação principal do Portal ESEO">
    <a href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta"
       target="_blank"
       rel="noopener noreferrer"
       data-page="home">Home</a>

    <a href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/Sobre-a-ESEO.aspx"
       target="_blank"
       rel="noopener noreferrer"
       data-page="conheca">Conheça a ESEO</a>

    <a href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/What's-happening.aspx"
       target="_blank"
       rel="noopener noreferrer"
       data-page="oferta">Oferta de cursos online</a>
  </nav>

  <script>
    const links = Array.from(document.querySelectorAll('[data-page]'));
    const paginaInformada = new URLSearchParams(window.location.search).get('ativa');
    const paginaPai = decodeURIComponent(document.referrer || '').toLowerCase();
    const paginasValidas = ['home', 'conheca', 'oferta'];

    let paginaAtual = paginasValidas.includes(paginaInformada) ? paginaInformada : '';

    if (!paginaAtual) {
      if (/oferta.*curso|cursos.*online|what'?s-happening/.test(paginaPai)) paginaAtual = 'oferta';
      else if (/conheca|conheça|sobre-a-eseo/.test(paginaPai)) paginaAtual = 'conheca';
      else paginaAtual = 'home';
    }

    links.forEach((link) => {
      const estaAtivo = link.dataset.page === paginaAtual;
      link.classList.toggle('ativo', estaAtivo);

      if (estaAtivo) link.setAttribute('aria-current', 'page');
      else link.removeAttribute('aria-current');
    });
  </script>
</body>
</html>
