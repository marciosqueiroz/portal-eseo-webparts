<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pesquisa de satisfação — Portal ESEO</title>

  <style>
    :root {
      --eseo-navy: #061923;
      --eseo-navy-soft: #0a2537;
      --eseo-blue: #1d728f;
      --eseo-cyan: #0eb7d5;
      --eseo-red: #e30613;
      --eseo-white: #ffffff;
      --eseo-muted: rgba(255,255,255,.76);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 720px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent !important;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body { padding: 8px; }

    .survey-shell {
      position: relative;
      width: min(100%, 1480px);
      min-height: 700px;
      display: grid;
      grid-template-columns: minmax(300px, .72fr) minmax(620px, 1.28fr);
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px;
      background:
        linear-gradient(
          118deg,
          rgba(6,25,35,.94) 0%,
          rgba(10,37,55,.88) 42%,
          rgba(29,114,143,.42) 100%
        );
      box-shadow:
        0 22px 56px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter: blur(12px) saturate(115%);
      -webkit-backdrop-filter: blur(12px) saturate(115%);
    }

    .survey-shell::before {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      z-index: 3;
      height: 3px;
      content: "";
      background: linear-gradient(
        90deg,
        var(--eseo-cyan),
        rgba(255,255,255,.60) 62%,
        var(--eseo-red)
      );
    }

    .survey-copy {
      position: relative;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(38px, 5vw, 72px);
      color: var(--eseo-white);
    }

    .survey-copy::after {
      position: absolute;
      top: 12%;
      right: 0;
      bottom: 12%;
      width: 1px;
      content: "";
      background: linear-gradient(
        transparent,
        rgba(14,183,213,.68),
        transparent
      );
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--eseo-cyan);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 470px;
      margin: 0;
      font-size: clamp(38px, 4.6vw, 64px);
      font-weight: 760;
      letter-spacing: -.045em;
      line-height: .98;
    }

    .survey-text {
      max-width: 500px;
      margin: 22px 0 0;
      color: var(--eseo-muted);
      font-size: clamp(16px, 1.35vw, 19px);
      line-height: 1.5;
    }

    .survey-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 9px 18px;
      margin-top: 30px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,.13);
      color: rgba(255,255,255,.66);
      font-size: 12px;
      font-weight: 650;
    }

    .survey-meta span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .survey-meta span::before {
      width: 5px;
      height: 5px;
      background: var(--eseo-cyan);
      content: "";
    }

    .form-column {
      min-width: 0;
      display: grid;
      place-items: center;
      padding: 28px clamp(22px, 3vw, 44px);
    }

    .form-frame {
      position: relative;
      width: min(100%, 760px);
      height: 640px;
      overflow: hidden;
      border-radius: 10px;
      background: var(--eseo-white);
      box-shadow: 0 20px 46px rgba(0,0,0,.24);
    }

    /*
      O iframe fica alguns pixels mais largo que a moldura.
      Assim, o trilho interno do Customer Voice permanece funcional,
      mas é recortado para fora da área visível.
    */
    .customer-voice {
      width: calc(100% + 26px);
      height: 900px;
      display: block;
      margin: 0;
      border: 0;
      background: var(--eseo-white);
    }

    @media (max-width: 960px) {
      html, body { min-height: 1020px; overflow-y: auto; }
      .survey-shell { grid-template-columns: 1fr; }
      .survey-copy { padding: 40px 34px; }
      .survey-copy::after {
        top: auto;
        right: 8%;
        bottom: 0;
        left: 8%;
        width: auto;
        height: 1px;
      }
      .form-column { padding: 25px 18px 30px; }
    }

    @media (max-width: 560px) {
      body { padding: 0; }
      .survey-shell { border-radius: 0; }
      .survey-copy { padding: 34px 24px; }
      .form-column { padding-inline: 8px; }
      .form-frame { height: 660px; border-radius: 5px; }
    }
  </style>
</head>

<body>
  <main class="survey-shell">
    <section class="survey-copy" aria-labelledby="surveyTitle">
      <p class="eyebrow">Pesquisa de satisfação</p>
      <h1 id="surveyTitle">Ajude a melhorar o Portal ESEO</h1>
      <p class="survey-text">
        Sua experiência ajuda a equipe a priorizar as próximas melhorias.
        Responder leva menos de um minuto.
      </p>
      <div class="survey-meta" aria-label="Informações sobre a pesquisa">
        <span>2 perguntas</span>
        <span>Resposta rápida</span>
      </div>
    </section>

    <section class="form-column" aria-label="Formulário da pesquisa">
      <div class="form-frame">
        <iframe
          class="customer-voice"
          src="https://customervoice.microsoft.com/Pages/ResponsePage.aspx?id=3qZIQdENBE2kxXjjdOT21nGK6v4eNzNJg4WxJUmaEBNURUJXUktUU1dURFhLQlQxQlk4TkQ1SUJWSy4u&amp;vt=4148a6de-0dd1-4d04-a4c5-78e374e4f6d6_01756980-baf9-4d06-9884-98e1e51b9f0d_639204221260000000_NAM_Hash_6A8KCoy17K6bNMywD4ndFG2MohSBy3ZfGhIUIFSRw%3D&amp;lang=pt-br&amp;embed=true&amp;compact=true"
          title="Pesquisa de satisfação do Portal ESEO"
          frameborder="0"
          scrolling="yes"
          loading="eager"
        ></iframe>
      </div>
    </section>
  </main>
</body>
</html>
