<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Convite para pesquisa — Portal ESEO</title>

  <style>
    :root {
      --eseo-navy: #061923;
      --eseo-navy-soft: #0a2537;
      --eseo-cyan: #0eb7d5;
      --eseo-red: #e30613;
      --eseo-white: #ffffff;
      --eseo-muted: #d5e0e4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      color: var(--eseo-white);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      padding: 8px;
    }

    body.preview {
      background:
        linear-gradient(115deg, #0a2537, #610010 72%, #940719);
    }

    .survey-invite {
      position: relative;
      width: min(100%, 1480px);
      min-height: 164px;
      display: flex;
      align-items: center;
      margin: 0 auto;
      overflow: hidden;
      padding: 30px clamp(28px, 5vw, 76px);
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 16px;
      background:
        radial-gradient(
          circle at 94% -80%,
          rgba(227, 6, 19, 0.2),
          transparent 45%
        ),
        linear-gradient(
          112deg,
          rgba(6, 25, 35, 0.76) 0%,
          rgba(10, 37, 55, 0.6) 58%,
          rgba(62, 14, 25, 0.48) 100%
        );
      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      isolation: isolate;
    }

    .survey-invite::before {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 5px;
      content: "";
      background: linear-gradient(
        180deg,
        var(--eseo-cyan),
        var(--eseo-red)
      );
    }

    .survey-invite::after {
      position: absolute;
      right: -145px;
      bottom: -205px;
      z-index: -1;
      width: 420px;
      height: 420px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      content: "";
      box-shadow:
        0 0 0 58px rgba(255, 255, 255, 0.022),
        0 0 0 116px rgba(255, 255, 255, 0.014);
    }

    .survey-copy {
      max-width: 950px;
    }

    .survey-title {
      margin: 0;
      color: var(--eseo-white);
      font-size: clamp(30px, 3.3vw, 50px);
      font-weight: 760;
      letter-spacing: -0.045em;
      line-height: 1;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.46);
      text-transform: uppercase;
    }

    .survey-text {
      margin: 16px 0 0;
      color: var(--eseo-muted);
      font-size: clamp(15px, 1.4vw, 19px);
      font-weight: 450;
      line-height: 1.4;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.42);
    }

    @media (max-width: 620px) {
      body {
        padding: 0;
      }

      .survey-invite {
        min-height: 180px;
        padding: 28px 24px;
        border-radius: 0;
      }

      .survey-title {
        font-size: clamp(28px, 8vw, 38px);
      }
    }
  </style>
</head>

<body>
  <section class="survey-invite" aria-labelledby="surveyInviteTitle">
    <div class="survey-copy">
      <h1 class="survey-title" id="surveyInviteTitle">
        Ajude a melhorar o Portal ESEO
      </h1>
      <p class="survey-text">
        Sua experiência ajuda a equipe a priorizar as próximas melhorias.
        Responder leva menos de um minuto.
      </p>
    </div>
  </section>

  <script>
    if (new URLSearchParams(window.location.search).get("preview") === "1") {
      document.body.classList.add("preview");
    }
  </script>
</body>
</html>
