<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pesquisa de satisfação — botão</title>
  <script src="https://mfpembedcdnwus2.azureedge.net/mfpembedcontwus2/Embed.js" type="text/javascript"></script>
  <link rel="stylesheet" href="https://mfpembedcdnwus2.azureedge.net/mfpembedcontwus2/Embed.css">
  <style>
    :root { --red:#970025; --yellow:#ffbf00; --text:#17171a; --muted:#5f626b; }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; background:#fff; font-family:"Segoe UI",Arial,sans-serif; color:var(--text); }
    .section { min-height:430px; padding:54px clamp(28px,6vw,90px); position:relative; overflow:hidden; }
    .content { width:min(1250px,100%); margin:auto; }
    .eyebrow { margin:0 0 20px; color:var(--red); font-size:15px; line-height:1.2; font-weight:900; letter-spacing:.18em; text-transform:uppercase; }
    .eyebrow::before { content:""; display:inline-block; width:34px; height:4px; margin:0 12px 4px 0; border-radius:20px; background:var(--red); }
    h1 { max-width:720px; margin:0 0 14px; font-size:clamp(38px,4.5vw,64px); line-height:1; font-weight:400; letter-spacing:-.045em; }
    p { max-width:680px; margin:0; color:var(--muted); font-size:clamp(17px,1.5vw,21px); line-height:1.5; }
    .hint { margin-top:28px; color:var(--red); font-size:13px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    #MfpEmbed_Button_Container,
    #MfpEmbed_Button_Container_Collapse { position:absolute!important; right:clamp(28px,6vw,90px)!important; bottom:54px!important; margin:0!important; }
    #MfpEmbed_Button { min-height:52px!important; padding:0 22px!important; background:var(--red)!important; border-radius:4px!important; font-size:15px!important; font-weight:700!important; }
    @media(max-width:720px){ .section{min-height:460px;padding:36px 22px;} #MfpEmbed_Button_Container,#MfpEmbed_Button_Container_Collapse{left:22px!important;right:auto!important;bottom:36px!important;} }
  </style>
</head>
<body>
  <main class="section">
    <div class="content">
      <p class="eyebrow">Sua experiência importa</p>
      <h1>Como está sendo usar o Portal ESEO?</h1>
      <p>Uma resposta rápida ajuda a equipe a priorizar as próximas melhorias.</p>
      <p class="hint">Use o botão abaixo para avaliar</p>
    </div>
  </main>
  <script>
    function renderSurvey(FirstName, LastName, locale, companyname, Email){
      var se = new SurveyEmbed(
        "3qZIQdENBE2kxXjjdOT21nGK6v4eNzNJg4WxJUmaEBNUOTFNNlI1V1RBMFJSNFNMNlBDRVpOSko0RC4u",
        "https://customervoice.microsoft.com/",
        "https://mfpembedcdnwus2.azureedge.net/mfpembedcontwus2/",
        "true"
      );
      var context={"First Name":FirstName,"Last Name":LastName,"locale":locale,"companyname":companyname,"Email":Email};
      se.renderButton(context);
    }
    window.addEventListener("load",function(){ renderSurvey("","","pt-BR","SENAI-SP",""); });
  </script>
</body>
</html>
