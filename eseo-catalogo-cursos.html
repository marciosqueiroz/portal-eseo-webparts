<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio de cursos corrigido — ESEO</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: transparent;
    }

    #catalogBase {
      display: block;
      width: 100%;
      min-height: 1180px;
      border: 0;
      background: transparent;
    }

    @media (max-width: 820px) {
      #catalogBase { min-height: 1650px; }
    }
  </style>
</head>
<body>
  <!--
    Este arquivo usa a base de cursos já existente:
    ./eseo-catalogo-cursos.html

    Materiais de divulgação:
    a configuração abaixo permite cadastrar um link específico por título.
    O curso de cosméticos já está cadastrado como exemplo validado.
  -->
  <iframe
    id="catalogBase"
    src="./eseo-catalogo-cursos.html"
    title="Portfólio de cursos da ESEO"
    loading="eager"
    allowtransparency="true"
  ></iframe>

  <script>
    const SOLUCOES_EAD_EMAIL = "eadempresas@sp.senai.br";

    const MATERIALS_BY_TITLE = {
      "por dentro dos rotulos de cosmeticos":
        "https://sesisenaisp.sharepoint.com/sites/ESEOConecta/Lists/Galeria%20de%20posts%20para%20redes%20sociais/DispForm.aspx?ID=3&e=PM0QON"
    };

    /*
      Quando a Taise disponibilizar uma biblioteca geral, o link pode ser passado:
      eseo-catalogo-cursos-corrigido.html?material=URL_CODIFICADA
    */
    const GENERAL_MATERIAL_URL =
      new URLSearchParams(location.search).get("material") || "";

    const frame = document.getElementById("catalogBase");

    function normalize(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function materialUrlFor(title) {
      return MATERIALS_BY_TITLE[normalize(title)] || GENERAL_MATERIAL_URL || "";
    }

    function openEmail(title, code) {
      const subject = `Solicitação de informações — ${title}${code ? " — Cód. " + code : ""}`;
      const body = [
        "Olá, equipe de Soluções EAD.",
        "",
        `Gostaria de receber orientações sobre a oferta do curso: ${title}.`,
        code ? `Código SGSET: ${code}.` : "",
        "",
        "Unidade/CFP:",
        "Necessidade:",
        "",
        "Obrigado."
      ].filter(Boolean).join("\n");

      location.href =
        `mailto:${SOLUCOES_EAD_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    function showToast(doc, message) {
      const toast = doc.getElementById("toast");
      if (!toast) {
        window.alert(message);
        return;
      }
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(window.__eseoToastTimer);
      window.__eseoToastTimer = setTimeout(() => toast.classList.remove("show"), 3500);
    }

    function injectStyle(doc) {
      if (doc.getElementById("eseoPortfolioBusinessPatch")) return;

      const style = doc.createElement("style");
      style.id = "eseoPortfolioBusinessPatch";
      style.textContent = `
        html, body, .catalog, .shell, .workspace {
          max-width: 100% !important;
          overflow-x: hidden !important;
          box-shadow: none !important;
        }

        .drawer {
          box-shadow: none !important;
          border-left: 1px solid #dce2ea !important;
          background: #ffffff !important;
        }

        #copyCourse {
          display: none !important;
        }

        .drawer-actions {
          grid-template-columns: minmax(0, 1.25fr) minmax(145px, .75fr) !important;
          gap: 10px !important;
        }

        .eseo-business-cta,
        #drawerSgset {
          min-height: 50px !important;
          border-radius: 11px !important;
          font-size: 13px !important;
          font-weight: 900 !important;
          transition:
            transform .18s ease,
            box-shadow .18s ease,
            border-color .18s ease !important;
        }

        .eseo-business-cta {
          border: 1px solid #0a2537 !important;
          background: #0a2537 !important;
          color: #ffffff !important;
          cursor: pointer;
        }

        .eseo-business-cta:hover,
        .eseo-business-cta:focus-visible {
          transform: translateY(-2px) !important;
          box-shadow:
            0 12px 25px rgba(10,37,55,.18),
            0 0 0 4px rgba(14,183,213,.08) !important;
        }

        #drawerSgset {
          border: 1px solid #cfd9df !important;
          background: #ffffff !important;
          color: #0a2537 !important;
        }

        #drawerSgset:hover,
        #drawerSgset:focus-visible {
          transform: translateY(-2px) !important;
          border-color: #0eb7d5 !important;
          box-shadow: 0 10px 22px rgba(10,37,55,.10) !important;
        }

        .sgset-button.eseo-repurposed {
          min-width: 112px !important;
          border-color: #cfd9df !important;
          color: #0a2537 !important;
          background: #ffffff !important;
        }

        .sgset-button.eseo-repurposed:hover,
        .sgset-button.eseo-repurposed:focus-visible {
          border-color: #0eb7d5 !important;
          transform: translateY(-2px) !important;
          box-shadow: 0 9px 20px rgba(10,37,55,.08) !important;
        }

        .drawer-note {
          max-width: 430px;
          margin-inline: auto !important;
        }

        @media (max-width: 560px) {
          .drawer-actions { grid-template-columns: 1fr !important; }
        }
      `;
      doc.head.appendChild(style);
    }

    function replaceVisibleTexts(doc) {
      const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
      const nodes = [];

      while (walker.nextNode()) nodes.push(walker.currentNode);

      nodes.forEach(node => {
        let value = node.nodeValue;
        value = value
          .replaceAll("AREA MANUTENCAO E OPERACAO", "Manutenção e Operação")
          .replaceAll("ÁREA MANUTENÇÃO E OPERAÇÃO", "Manutenção e Operação")
          .replaceAll("MANUTENÇÃO E OPERAÇÃO", "Manutenção e Operação")
          .replaceAll("Mais informações", "Sob consulta")
          .replaceAll("MAIS INFORMAÇÕES", "SOB CONSULTA");
        node.nodeValue = value;
      });

      doc.querySelectorAll("option").forEach(option => {
        if (normalize(option.textContent) === "manutencao e operacao") {
          option.textContent = "Manutenção e Operação";
        }
      });
    }

    function patchCards(doc) {
      doc.querySelectorAll(".course-card").forEach(card => {
        const oldButton = card.querySelector(".sgset-button");
        if (!oldButton || oldButton.classList.contains("eseo-repurposed")) return;

        const title = (card.querySelector(".course-title")?.textContent || "").trim();
        const code = (card.querySelector(".course-code")?.textContent || "")
          .replace(/^Cód\.\s*/i, "")
          .trim();
        const cardText = normalize(card.textContent);
        const isReady =
          cardText.includes("pronto") ||
          cardText.includes("autoinstrucional");

        const button = oldButton.cloneNode(true);
        button.classList.add("eseo-repurposed");
        button.removeAttribute("data-sgset");
        oldButton.replaceWith(button);

        if (isReady) {
          button.textContent = "Divulgação ↗";
          button.setAttribute("aria-label", `Abrir material de divulgação de ${title}`);
          button.addEventListener("click", event => {
            event.preventDefault();
            const url = materialUrlFor(title);
            if (url) window.open(url, "_blank", "noopener,noreferrer");
            else showToast(doc, "Material de divulgação em curadoria para este curso.");
          });
        } else {
          button.textContent = "Fale com a gente ↗";
          button.setAttribute("aria-label", `Falar com a equipe sobre ${title}`);
          button.addEventListener("click", event => {
            event.preventDefault();
            openEmail(title, code);
          });
        }
      });
    }

    function ensureDrawerCta(doc) {
      const actions = doc.querySelector(".drawer-actions");
      const sgset = doc.getElementById("drawerSgset");
      if (!actions || !sgset) return null;

      let cta = doc.getElementById("eseoBusinessCta");

      if (!cta) {
        cta = doc.createElement("button");
        cta.type = "button";
        cta.id = "eseoBusinessCta";
        cta.className = "eseo-business-cta";
        actions.insertBefore(cta, sgset);
      }

      sgset.textContent = "Consultar SGSET ↗";
      return cta;
    }

    function patchDrawer(doc) {
      const drawer = doc.getElementById("courseDrawer");
      if (!drawer || !drawer.classList.contains("open")) return;

      const cta = ensureDrawerCta(doc);
      if (!cta) return;

      const title = (doc.getElementById("drawerTitle")?.textContent || "").trim();
      const code = (doc.getElementById("drawerCode")?.textContent || "").trim();
      const model = normalize(doc.getElementById("drawerModel")?.textContent);
      const offer = normalize(doc.getElementById("drawerOferta")?.textContent);
      const isReady = model.includes("autoinstrucional") || offer.includes("pronto");

      cta.replaceWith(cta.cloneNode(true));
      const newCta = doc.getElementById("eseoBusinessCta");

      if (isReady) {
        newCta.textContent = "Material de divulgação ↗";
        newCta.setAttribute("aria-label", `Abrir material de divulgação de ${title}`);
        newCta.addEventListener("click", () => {
          const url = materialUrlFor(title);
          if (url) window.open(url, "_blank", "noopener,noreferrer");
          else showToast(doc, "Material de divulgação em curadoria para este curso.");
        });
      } else {
        newCta.textContent = "Fale com a gente ↗";
        newCta.setAttribute("aria-label", `Falar com a equipe sobre ${title}`);
        newCta.addEventListener("click", () => openEmail(title, code));

        const offerBox = doc.getElementById("drawerOferta");
        if (offerBox) {
          offerBox.innerHTML =
            '<span class="oferta-badge oferta-info">ℹ Sob consulta</span>';
        }
      }
    }

    function adjustHeight(doc) {
      const height = Math.max(
        1050,
        doc.documentElement.scrollHeight,
        doc.body.scrollHeight
      );
      frame.style.height = `${Math.min(height + 12, 1900)}px`;
    }

    function applyPatch() {
      const doc = frame.contentDocument;
      if (!doc || !doc.body) return;

      injectStyle(doc);
      replaceVisibleTexts(doc);
      patchCards(doc);
      ensureDrawerCta(doc);
      patchDrawer(doc);
      adjustHeight(doc);

      const observer = new MutationObserver(() => {
        replaceVisibleTexts(doc);
        patchCards(doc);
        patchDrawer(doc);
        adjustHeight(doc);
      });

      observer.observe(doc.body, {
        subtree: true,
        childList: true,
        characterData: true,
        attributes: true,
        attributeFilter: ["class", "style"]
      });
    }

    frame.addEventListener("load", applyPatch);
  </script>
</body>
</html>
