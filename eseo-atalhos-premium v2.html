<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atalhos quadrados do Portal ESEO</title>
  <style>
    :root {
      --tamanho-card: 112px;
      --tamanho-icone: 34px;
      --tamanho-texto: 11px;
      --dourado: #ffb900;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      color: #fff;
      background: transparent !important;
      font-family: "Segoe UI", Inter, Arial, sans-serif;
    }

    .component {
      width: max-content;
      max-width: 100%;
      padding: 4px;
      background: transparent;
    }

    .shortcuts {
      width: max-content;
      max-width: 100%;
      display: grid;
      grid-template-columns: repeat(4, var(--tamanho-card));
      grid-auto-rows: var(--tamanho-card);
      gap: 12px;
    }

    .shortcut {
      width: var(--tamanho-card) !important;
      min-width: var(--tamanho-card) !important;
      max-width: var(--tamanho-card) !important;
      height: var(--tamanho-card) !important;
      min-height: var(--tamanho-card) !important;
      max-height: var(--tamanho-card) !important;
      aspect-ratio: 1 / 1;
      display: flex !important;
      flex: 0 0 var(--tamanho-card) !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 9px;
      margin: 0 !important;
      padding: 11px 8px !important;
      border: 1px solid rgba(255, 255, 255, .9);
      border-radius: 10px;
      color: #fff;
      background: transparent;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08);
      backdrop-filter: blur(5px);
      text-decoration: none;
      cursor: pointer;
      transition: transform .18s ease, color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .shortcut:hover,
    .shortcut:focus-visible {
      color: #061a30;
      background: rgba(255, 255, 255, .97);
      box-shadow: 0 14px 28px rgba(0, 0, 0, .26);
      transform: translateY(-3px);
      outline: 0;
    }

    .shortcut svg {
      width: var(--tamanho-icone) !important;
      min-width: var(--tamanho-icone) !important;
      height: var(--tamanho-icone) !important;
      min-height: var(--tamanho-icone) !important;
      flex: 0 0 var(--tamanho-icone) !important;
      color: #fff;
      filter: drop-shadow(0 5px 10px rgba(0, 0, 0, .2));
    }

    .shortcut:hover svg,
    .shortcut:focus-visible svg { color: #0877d1; }

    .shortcut-title {
      width: 100%;
      display: block;
      color: inherit;
      font-size: var(--tamanho-texto);
      font-weight: 800;
      line-height: 1.25;
      text-align: center;
      text-transform: uppercase;
      white-space: normal;
      overflow-wrap: normal;
    }

    .explanation {
      width: 484px;
      max-width: 100%;
      min-height: 48px;
      display: flex;
      align-items: center;
      margin-top: 10px;
      padding: 8px 12px;
      border-left: 3px solid transparent;
      border-radius: 7px;
      color: rgba(255, 255, 255, .78);
      background: transparent;
      font-size: 13px;
      line-height: 1.35;
      opacity: .76;
      transition: opacity .16s ease, background .16s ease, border-color .16s ease;
    }

    .explanation.active {
      border-left-color: var(--dourado);
      background: rgba(3, 13, 23, .72);
      opacity: 1;
      backdrop-filter: blur(9px);
    }

    .explanation strong { color: #fff; }

    @media (max-width: 520px) {
      html, body { overflow: auto; }
      .shortcuts { grid-template-columns: repeat(2, var(--tamanho-card)); }
    }

    @media (max-width: 260px) {
      .shortcuts { grid-template-columns: var(--tamanho-card); }
    }
  </style>
</head>
<body>
  <main class="component">
    <nav class="shortcuts" aria-label="Atalhos do Portal ESEO">
      <a class="shortcut" href="#" data-title="Portfólio de Cursos" data-description="Consulte cursos, formatos de oferta e informações do catálogo EAD.">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="m3 9 9-5 9 5-9 5-9-5Z"/><path d="M7 11v5c3 2 7 2 10 0v-5"/></svg>
        <span class="shortcut-title">Portfólio de Cursos</span>
      </a>

      <a class="shortcut" href="#" data-title="Liberar Turma SGSET" data-description="Acesse as orientações e o caminho para solicitar ou acompanhar a liberação de turma.">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M9 10V7a4 4 0 0 1 7.7-1.5"/></svg>
        <span class="shortcut-title">Liberar Turma SGSET</span>
      </a>

      <a class="shortcut" href="#" data-title="Soluções EAD" data-description="Conheça recursos, modelos e soluções disponíveis para apoiar ofertas online.">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1 6.2-5.5-2.9-5.5 2.9 1-6.2L3 9.6l6.2-.9L12 3Z"/></svg>
        <span class="shortcut-title">Soluções EAD</span>
      </a>

      <a class="shortcut" href="#" data-title="Parceria AQV ESEO" data-description="Veja como solicitar apoio e acompanhar ações realizadas em parceria com a ESEO.">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="9" cy="8" r="3"/><path d="M3.5 20v-2.5A4.5 4.5 0 0 1 8 13h2a4.5 4.5 0 0 1 4.5 4.5V20"/><path d="M16 7a3 3 0 0 1 0 6m1 1a4 4 0 0 1 3.5 4v2"/></svg>
        <span class="shortcut-title">Parceria AQV ESEO</span>
      </a>
    </nav>

    <div class="explanation" id="explanation" aria-live="polite">
      Passe o cursor sobre um serviço para conhecer o caminho.
    </div>
  </main>

  <script>
    const cards = document.querySelectorAll(".shortcut");
    const explanation = document.getElementById("explanation");
    const defaultText = "Passe o cursor sobre um serviço para conhecer o caminho.";

    function showExplanation(card) {
      explanation.textContent = card.dataset.description;
      explanation.classList.add("active");
    }

    function resetExplanation() {
      explanation.textContent = defaultText;
      explanation.classList.remove("active");
    }

    cards.forEach(card => {
      card.addEventListener("mouseenter", () => showExplanation(card));
      card.addEventListener("focus", () => showExplanation(card));
      card.addEventListener("mouseleave", resetExplanation);
      card.addEventListener("blur", resetExplanation);
      card.addEventListener("click", event => {
        if (card.getAttribute("href") === "#") event.preventDefault();
      });
    });
  </script>
</body>
</html>
