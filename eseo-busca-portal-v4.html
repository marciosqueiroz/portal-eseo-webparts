<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Busca compacta do Portal ESEO — versão 4</title>
  <style>
    :root {
      --altura-barra: 58px;
      --icone: 22px;
      --botao: 42px;
      --dourado: #ffb900;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 66px;
      min-height: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent !important;
      font-family: "Segoe UI", Inter, Arial, sans-serif;
    }

    .wrap {
      width: min(100%, 660px);
      height: 66px;
      margin: 0;
      padding: 4px;
      background: transparent;
    }

    .search-form {
      width: 100%;
      height: var(--altura-barra);
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--botao);
      align-items: center;
      gap: 12px;
      margin: 0;
      padding: 0 7px 0 18px;
      border: 1px solid rgba(255, 255, 255, .78);
      border-radius: 10px;
      background: rgba(3, 13, 23, .36);
      box-shadow: 0 12px 28px rgba(0, 0, 0, .2);
      backdrop-filter: blur(11px);
      transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .search-form:focus-within {
      border-color: var(--dourado);
      background: rgba(3, 13, 23, .62);
      box-shadow: 0 0 0 3px rgba(255, 185, 0, .17), 0 12px 28px rgba(0, 0, 0, .28);
    }

    #siteSearch {
      width: 100%;
      min-width: 0;
      height: 40px;
      margin: 0;
      padding: 0;
      border: 0;
      outline: 0;
      color: #fff;
      background: transparent;
      font-size: 16px;
      font-weight: 500;
    }

    #siteSearch::placeholder { color: rgba(255, 255, 255, .8); opacity: 1; }

    .search-button {
      width: var(--botao) !important;
      min-width: var(--botao) !important;
      max-width: var(--botao) !important;
      height: var(--botao) !important;
      min-height: var(--botao) !important;
      max-height: var(--botao) !important;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 8px;
      color: #061a30;
      background: var(--dourado);
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .search-button:hover,
    .search-button:focus-visible {
      background: #ffd154;
      box-shadow: 0 8px 20px rgba(255, 185, 0, .25);
      transform: translateY(-1px);
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    .search-button svg {
      display: block;
      width: 20px !important;
      min-width: 20px !important;
      height: 20px !important;
      min-height: 20px !important;
      overflow: visible;
    }

    @media (max-width: 460px) {
      .search-form { gap: 8px; padding-left: 12px; }
      #siteSearch { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <form class="search-form" id="searchForm" role="search">
      <input id="siteSearch" type="search" required autocomplete="off" placeholder="Buscar por palavra-chave no Portal ESEO" aria-label="Buscar por palavra-chave no Portal ESEO">

      <button class="search-button" type="submit" aria-label="Pesquisar no Portal ESEO">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle><path d="m20 20-4-4"></path>
        </svg>
      </button>
    </form>
  </main>

  <script>
    /* Site autorizado para a pesquisa: somente o Portal ESEO Conecta */
    const SEARCH_SITE_URL = "https://sesisenaisp.sharepoint.com/sites/ESEOConecta";

    const form = document.getElementById("searchForm");
    const input = document.getElementById("siteSearch");

    function getPortalBaseUrl() {
      if (SEARCH_SITE_URL.trim()) return SEARCH_SITE_URL.trim().replace(/\/$/, "");

      try {
        const referrer = new URL(document.referrer);
        const sitePath = referrer.pathname.split(/\/SitePages\//i)[0].replace(/\/$/, "");
        return `${referrer.origin}${sitePath}`;
      } catch {
        return "";
      }
    }

    input.addEventListener("input", () => input.setCustomValidity(""));

    form.addEventListener("submit", event => {
      event.preventDefault();
      input.setCustomValidity("");

      if (!input.value.trim()) {
        input.setCustomValidity("Digite o que deseja localizar no Portal ESEO.");
        input.reportValidity();
        return;
      }

      const portalBase = getPortalBaseUrl();
      if (!portalBase) {
        input.setCustomValidity("É necessário configurar o endereço do Portal ESEO.");
        input.reportValidity();
        return;
      }

      /*
        Restringe os resultados ao Portal ESEO.
        A propriedade Path é uma restrição KQL nativa do SharePoint Search.
      */
      const scopedQuery = `${input.value.trim()} Path:"${portalBase}"`;
      const searchUrl = `${portalBase}/_layouts/15/search.aspx/siteall?q=${encodeURIComponent(scopedQuery)}`;
      window.open(searchUrl, "_blank", "noopener,noreferrer");
    });
  </script>
</body>
</html>
