<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atalhos do Portal ESEO</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      color: #fff;
      background: transparent !important;
      font-family: "Segoe UI", Inter, Arial, sans-serif;
    }
    .component { width: min(100%, 1030px); padding: 6px; }
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .shortcut {
      min-width: 0;
      min-height: 54px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border: 1px solid rgba(255, 255, 255, .8);
      border-radius: 8px;
      color: #fff;
      background: rgba(255, 255, 255, .035);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08);
      backdrop-filter: blur(7px);
      text-decoration: none;
      cursor: pointer;
      transition: transform .18s ease, color .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .shortcut:hover, .shortcut:focus-visible {
      color: #061a30;
      background: rgba(255, 255, 255, .96);
      border-color: #fff;
      box-shadow: 0 14px 28px rgba(0, 0, 0, .25);
      transform: translateY(-3px);
      outline: 0;
    }
    .shortcut svg { flex: 0 0 auto; width: 21px; height: 21px; color: #ffb900; }
    .shortcut:hover svg, .shortcut:focus-visible svg { color: #0877d1; }
    .shortcut span {
      overflow: hidden;
      font-size: 12px;
      font-weight: 750;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .explanation {
      min-height: 48px;
      display: flex;
      align-items: center;
      margin-top: 10px;
      padding: 8px 12px;
      border-left: 3px solid transparent;
      border-radius: 7px;
      color: rgba(255, 255, 255, .8);
      background: transparent;
      font-size: 13px;
      line-height: 1.35;
      opacity: .72;
      transition: opacity .16s ease, background .16s ease, border-color .16s ease;
    }
    .explanation.active {
      border-left-color: #ffb900;
      background: rgba(3, 13, 23, .48);
      opacity: 1;
      backdrop-filter: blur(9px);
    }
    .explanation strong { color: #fff; }
    .toast {
      position: fixed;
      z-index: 20;
      left: 8px;
      bottom: 5px;
      width: min(520px, calc(100% - 16px));
      padding: 10px 13px;
      border-left: 4px solid #ffb900;
      border-radius: 7px;
      color: #fff;
      background: rgba(3, 13, 23, .97);
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity .18s ease, transform .18s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 760px) {
      html, body { overflow: auto; }
      .shortcuts { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 460px) { .shortcuts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="component">
    <nav class="shortcuts" id="quickLinks" aria-label="Atalhos do Portal ESEO"></nav>
    <div class="explanation" id="explanation" aria-live="polite">Passe o cursor sobre um serviço para conhecer o caminho.</div>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    /* Preencha url com o endereço real de cada serviço. */
    const services = [
      { title: "Portfólio de Cursos", description: "Consulte cursos, formatos de oferta e informações do catálogo EAD.", url: "", icon: "course" },
      { title: "Liberar Turma SGSET", description: "Acesse as orientações e o caminho para solicitar ou acompanhar a liberação de turma.", url: "", icon: "unlock" },
      { title: "Soluções EAD", description: "Conheça recursos, modelos e soluções disponíveis para apoiar ofertas online.", url: "", icon: "star" },
      { title: "Parceria AQV ESEO", description: "Veja como solicitar apoio e acompanhar ações realizadas em parceria com a ESEO.", url: "", icon: "people" }
    ];
    const icons = {
      course: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="m3 9 9-5 9 5-9 5-9-5Z"/><path d="M7 11v5c3 2 7 2 10 0v-5"/></svg>',
      unlock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M9 10V7a4 4 0 0 1 7.7-1.5"/></svg>',
      star: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1 6.2-5.5-2.9-5.5 2.9 1-6.2L3 9.6l6.2-.9L12 3Z"/></svg>',
      people: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="9" cy="8" r="3"/><path d="M3.5 20v-2.5A4.5 4.5 0 0 1 8 13h2a4.5 4.5 0 0 1 4.5 4.5V20"/><path d="M16 7a3 3 0 0 1 0 6m1 1a4 4 0 0 1 3.5 4v2"/></svg>'
    };
    const links = document.getElementById("quickLinks");
    const explanation = document.getElementById("explanation");
    const toast = document.getElementById("toast");
    const defaultText = "Passe o cursor sobre um serviço para conhecer o caminho.";
    let toastTimer;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 3300);
    }

    services.forEach(service => {
      const link = document.createElement("a");
      link.className = "shortcut";
      link.href = service.url || "#";
      link.innerHTML = `${icons[service.icon]}<span>${service.title}</span>`;
      const explain = () => {
        explanation.innerHTML = `<strong>${service.title}:</strong>&nbsp; ${service.description}`;
        explanation.classList.add("active");
      };
      const reset = () => {
        explanation.textContent = defaultText;
        explanation.classList.remove("active");
      };
      link.addEventListener("mouseenter", explain);
      link.addEventListener("focus", explain);
      link.addEventListener("mouseleave", reset);
      link.addEventListener("blur", reset);
      link.addEventListener("click", event => {
        event.preventDefault();
        if (!service.url) {
          showToast(`O botão “${service.title}” está ativo. Falta apenas inserir o endereço real.`);
          return;
        }
        window.open(service.url, "_blank", "noopener,noreferrer");
      });
      links.appendChild(link);
    });
  </script>
</body>
</html>
