<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pesquisa de satisfação — Portal ESEO</title>
  <script src="https://mfpembedcdnwus2.azureedge.net/mfpembedcontwus2/Embed.js" type="text/javascript"></script>
  <link rel="stylesheet" type="text/css" href="https://mfpembedcdnwus2.azureedge.net/mfpembedcontwus2/Embed.css">
  <style>
    :root {
      --red: #970025;
      --red-dark: #690019;
      --yellow: #ffbf00;
      --navy: #06182b;
      --black: #090a0c;
      --text: #17171a;
      --muted: #62656d;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 760px;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .invitation {
      position: fixed;
      inset: 0;
      z-index: 900000;
      display: grid;
      place-items: center;
      padding: 30px;
      background:
        radial-gradient(circle at 78% 18%, rgba(151, 0, 37, .28), transparent 34%),
        linear-gradient(135deg, rgba(3, 13, 25, .94), rgba(9, 10, 12, .91));
      opacity: 0;
      visibility: hidden;
      transition: opacity .35s ease, visibility .35s ease;
    }

    .invitation.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .card {
      position: relative;
      width: min(980px, 100%);
      min-height: 470px;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      overflow: hidden;
      border-radius: 18px;
      background: var(--white);
      box-shadow: 0 34px 90px rgba(0, 0, 0, .42);
      transform: translateY(24px) scale(.98);
      transition: transform .45s cubic-bezier(.2,.8,.2,1);
    }

    .invitation.is-visible .card {
      transform: translateY(0) scale(1);
    }

    .card__content {
      padding: clamp(42px, 6vw, 72px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      margin: 0 0 22px;
      color: var(--red);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      display: inline-block;
      width: 34px;
      height: 4px;
      margin: 0 12px 4px 0;
      border-radius: 99px;
      background: var(--red);
    }

    h1 {
      max-width: 570px;
      margin: 0 0 18px;
      color: var(--text);
      font-size: clamp(40px, 5vw, 64px);
      line-height: .98;
      font-weight: 400;
      letter-spacing: -.048em;
    }

    .description {
      max-width: 610px;
      margin: 0;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.5;
    }

    .card__actions {
      position: relative;
      padding: clamp(42px, 5vw, 64px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background:
        linear-gradient(145deg, transparent 0 45%, rgba(255, 191, 0, .09) 45% 46%, transparent 46%),
        linear-gradient(145deg, var(--navy), var(--black));
    }

    .card__actions::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      right: -120px;
      top: -120px;
      border: 2px solid rgba(255, 191, 0, .5);
      transform: rotate(45deg);
    }

    .question {
      margin: 0 0 24px;
      color: var(--white);
      font-size: 18px;
      line-height: 1.45;
      font-weight: 600;
    }

    .action {
      width: 100%;
      min-height: 56px;
      margin: 0 0 12px;
      padding: 0 22px;
      border-radius: 5px;
      font: 800 14px/1 "Segoe UI", Arial, sans-serif;
      letter-spacing: .035em;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .action:hover,
    .action:focus-visible { transform: translateY(-2px); }

    .action--primary {
      border: 1px solid var(--red);
      background: var(--red);
      color: var(--white);
    }

    .action--primary:hover,
    .action--primary:focus-visible { background: var(--red-dark); }

    .action--later {
      border: 1px solid rgba(255,255,255,.55);
      background: transparent;
      color: var(--white);
    }

    .action--later:hover,
    .action--later:focus-visible { border-color: var(--yellow); }

    .action--never {
      min-height: 42px;
      margin-bottom: 0;
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .close {
      position: absolute;
      z-index: 2;
      top: 18px;
      right: 18px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.34);
      border-radius: 50%;
      background: rgba(0,0,0,.18);
      color: var(--white);
      font-size: 25px;
      line-height: 1;
      cursor: pointer;
    }

    .status {
      margin: 17px 0 0;
      color: rgba(255,255,255,.65);
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
    }

    @media (max-width: 760px) {
      html, body { min-height: 820px; overflow: auto; }
      .invitation { padding: 16px; overflow: auto; }
      .card { grid-template-columns: 1fr; }
      .card__content { padding: 42px 30px 34px; }
      .card__actions { padding: 38px 30px; }
      .close { background: var(--black); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="invitation" id="invitation" role="dialog" aria-modal="true" aria-labelledby="inviteTitle" aria-describedby="inviteDescription">
    <article class="card">
      <button class="close" id="closeInvitation" type="button" aria-label="Fechar por agora">×</button>

      <div class="card__content">
        <p class="eyebrow">Sua experiência importa</p>
        <h1 id="inviteTitle">Ajude a melhorar o Portal ESEO</h1>
        <p class="description" id="inviteDescription">Leva menos de um minuto. Sua avaliação ajudará a equipe a priorizar as próximas melhorias.</p>
      </div>

      <div class="card__actions">
        <p class="question">Você gostaria de compartilhar sua experiência agora?</p>
        <button class="action action--primary" id="answerNow" type="button">RESPONDER AGORA →</button>
        <button class="action action--later" id="answerLater" type="button">DEIXAR PARA DEPOIS</button>
        <button class="action action--never" id="neverAnswer" type="button">Não quero responder a esta pesquisa</button>
        <p class="status">Você pode fechar esta mensagem e continuar navegando normalmente.</p>
      </div>
    </article>
  </div>

  <script type="text/javascript">
    (function () {
      var PRODUCTION_DELAY_MS = 150000;
      var TEST_DELAY_MS = 5000;
      var LATER_DAYS = 7;
      var PREFERENCE_KEY = "eseo_feedback_invitation_preference_v1";
      var SESSION_KEY = "eseo_feedback_invitation_closed_session_v1";
      var invitation = document.getElementById("invitation");
      var answerNow = document.getElementById("answerNow");

      function isTestMode() {
        return new URLSearchParams(location.search).get("teste") === "1";
      }

      function resetRequested() {
        return new URLSearchParams(location.search).get("reset") === "1";
      }

      function readPreference() {
        try { return JSON.parse(localStorage.getItem(PREFERENCE_KEY) || "null"); }
        catch (error) { return null; }
      }

      function savePreference(value) {
        if (isTestMode()) return;
        try { localStorage.setItem(PREFERENCE_KEY, JSON.stringify(value)); }
        catch (error) {}
      }

      function mayDisplay() {
        if (isTestMode()) return true;
        try { if (sessionStorage.getItem(SESSION_KEY) === "1") return false; }
        catch (error) {}

        var preference = readPreference();
        if (!preference) return true;
        if (preference.type === "never" || preference.type === "answered") return false;
        if (preference.type === "later") return Date.now() >= preference.until;
        return true;
      }

      function showInvitation() {
        invitation.classList.add("is-visible");
        window.setTimeout(function () { answerNow.focus(); }, 350);
      }

      function hideInvitation() {
        invitation.classList.remove("is-visible");
      }

      function openSurvey() {
        savePreference({ type: "answered", at: Date.now() });
        hideInvitation();

        var se = new SurveyEmbed(
          "3qZIQdENBE2kxXjjdOT21nGK6v4eNzNJg4WxJUmaEBNUOTFNNlI1V1RBMFJSNFNMNlBDRVpOSko0RC4u",
          "https://customervoice.microsoft.com/",
          "https://mfpembedcdnwus2.azureedge.net/mfpembedcontwus2/",
          "true"
        );

        se.renderPopup({
          "First Name": "",
          "Last Name": "",
          "locale": "pt-BR",
          "companyname": "SENAI-SP",
          "Email": ""
        });
      }

      document.getElementById("closeInvitation").addEventListener("click", function () {
        try { sessionStorage.setItem(SESSION_KEY, "1"); } catch (error) {}
        hideInvitation();
      });

      document.getElementById("answerLater").addEventListener("click", function () {
        savePreference({
          type: "later",
          until: Date.now() + (LATER_DAYS * 24 * 60 * 60 * 1000)
        });
        hideInvitation();
      });

      document.getElementById("neverAnswer").addEventListener("click", function () {
        savePreference({ type: "never", at: Date.now() });
        hideInvitation();
      });

      answerNow.addEventListener("click", openSurvey);

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && invitation.classList.contains("is-visible")) {
          try { sessionStorage.setItem(SESSION_KEY, "1"); } catch (error) {}
          hideInvitation();
        }
      });

      window.addEventListener("load", function () {
        if (resetRequested()) {
          try {
            localStorage.removeItem(PREFERENCE_KEY);
            sessionStorage.removeItem(SESSION_KEY);
          } catch (error) {}
        }

        if (!mayDisplay()) return;
        window.setTimeout(showInvitation, isTestMode() ? TEST_DELAY_MS : PRODUCTION_DELAY_MS);
      });
    }());
  </script>
</body>
</html>
