<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customer Voice — abertura sob demanda</title>
  <style>
    :root { --navy: #0A2537; --cyan: #0EB7D5; --red: #E30613; --white: #FFFFFF; }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 82px;
      margin: 0;
      display: grid;
      place-items: center;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    button {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 22px;
      border: 1px solid var(--cyan);
      border-radius: 10px;
      background: var(--navy);
      color: var(--white);
      font: 800 13px/1 "Segoe UI", Arial, sans-serif;
      letter-spacing: .03em;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }
    button:hover { border-color: var(--red); background: var(--red); transform: translateY(-2px); }
    button:focus-visible { outline: 3px solid var(--cyan); outline-offset: 3px; }
    svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>
  <button id="openSurvey" type="button">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3 1.5-5A7 7 0 0 1 3 12a7 7 0 0 1 7-7h7a4 4 0 0 1 4 4Z"></path></svg>
    AVALIAR O PORTAL ESEO
  </button>

  <script>
    (function () {
      const SURVEY_URL = "https://customervoice.microsoft.com/Pages/ResponsePage.aspx?id=3qZIQdENBE2kxXjjdOT21nGK6v4eNzNJg4WxJUmaEBNUOTFNNlI1V1RBMFJSNFNMNlBDRVpOSko0RC4u";

      function openSurvey() {
        window.open(SURVEY_URL, "_blank", "noopener,noreferrer");
      }

      document.getElementById("openSurvey").addEventListener("click", openSurvey);

      /* Abertura automática somente quando solicitada para teste: ?abrir=1 */
      if (new URLSearchParams(location.search).get("abrir") === "1") {
        window.addEventListener("load", function () { window.setTimeout(openSurvey, 500); });
      }
    }());
  </script>
</body>
</html>
