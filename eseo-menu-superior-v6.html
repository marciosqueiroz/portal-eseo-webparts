<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu superior — Portal ESEO</title>
  <style>
    :root {
      --navy: #0a2537;
      --cyan: #0eb7d5;
      --red: #ed1c24;
      --white: #ffffff;
      --ink: #102b3a;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: visible;
      background: transparent !important;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .header {
      width: 100%;
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      padding: 0 clamp(22px, 3.2vw, 56px);
      background: transparent;
    }

    .nav {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: clamp(30px, 4vw, 72px);
    }

    .nav a {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 52px;
      color: var(--white);
      font-size: clamp(16px, 1.15vw, 19px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: .012em;
      text-decoration: none;
      text-shadow: 0 2px 8px rgba(0,0,0,.42);
      white-space: nowrap;
      transition: color .16s ease;
    }

    .nav a::after {
      position: absolute;
      right: 0;
      bottom: 4px;
      left: 0;
      height: 3px;
      border-radius: 999px;
      background: var(--cyan);
      content: "";
      opacity: 0;
      transform: scaleX(.35);
      transform-origin: center;
      transition: opacity .16s ease, transform .16s ease;
    }

    .nav a:hover,
    .nav a:focus-visible {
      color: var(--cyan);
    }

    .nav a:hover::after,
    .nav a:focus-visible::after {
      opacity: 1;
      transform: scaleX(1);
    }

    .nav a[aria-current="page"] {
      color: var(--red);
    }

    .nav a[aria-current="page"]::after {
      opacity: 0;
    }

    .search-host {
      position: relative;
      z-index: 50;
      flex: 0 0 52px;
      width: 52px;
      height: 52px;
    }

    .search-box {
      position: absolute;
      top: 0;
      right: 0;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      overflow: hidden;
      border: 2px solid var(--navy);
      border-radius: 999px;
      background: var(--white);
      box-shadow: 0 8px 22px rgba(0,0,0,.18);
      transition: width .28s cubic-bezier(.2,.8,.2,1), border-color .16s ease;
    }

    .search-host.is-open .search-box {
      width: min(440px, 42vw);
      border-color: var(--cyan);
    }

    .search-input {
      width: 0;
      min-width: 0;
      height: 48px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: 16px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: width .22s ease, padding .22s ease, opacity .12s ease;
    }

    .search-host.is-open .search-input {
      width: calc(100% - 50px);
      padding: 0 14px 0 18px;
      opacity: 1;
      pointer-events: auto;
    }

    .search-input::placeholder {
      color: #647983;
      opacity: 1;
    }

    .search-input::-webkit-search-cancel-button {
      display: none;
    }

    .search-button {
      width: 48px;
      height: 48px;
      display: grid;
      flex: 0 0 48px;
      place-items: center;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--navy);
      cursor: pointer;
      transition: color .15s ease, background .15s ease;
    }

    .search-button:hover,
    .search-button:focus-visible {
      color: var(--white);
      background: var(--navy);
    }

    .search-button svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.25;
      stroke-linecap: round;
    }

    .results {
      position: absolute;
      top: 60px;
      right: 0;
      width: min(440px, 88vw);
      display: none;
      padding-top: 3px;
      background: transparent;
    }

    .results.visible {
      display: block;
    }

    .result-item {
      width: 100%;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      margin: 3px 0;
      padding: 9px 11px;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 9px;
      background: rgba(10,37,55,.96);
      color: var(--white);
      text-align: left;
      cursor: pointer;
    }

    .result-item:hover,
    .result-item:focus-visible,
    .result-item.active {
      border-color: var(--cyan);
      background: #123f52;
    }

    .result-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(14,183,213,.62);
      border-radius: 8px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 900;
    }

    .result-item strong {
      display: block;
      color: var(--white);
      font-size: 14px;
      font-weight: 750;
      line-height: 1.2;
    }

    .result-item small {
      display: block;
      margin-top: 2px;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      line-height: 1.2;
    }

    .no-result {
      padding: 10px 12px;
      border-left: 3px solid var(--red);
      border-radius: 8px;
      background: rgba(10,37,55,.96);
      color: var(--white);
      font-size: 13px;
      line-height: 1.35;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    :focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 3px;
    }

    @media (max-width: 900px) {
      .header {
        gap: 16px;
        padding-inline: 14px;
      }

      .nav {
        gap: 20px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .nav::-webkit-scrollbar { display: none; }

      .nav a {
        font-size: 14px;
      }

      .search-host.is-open .search-box {
        width: min(360px, 44vw);
      }
    }

    @media (max-width: 620px) {
      .header {
        min-height: 144px;
        align-items: flex-start;
        padding-top: 12px;
      }

      .nav {
        gap: 15px;
      }

      .nav a {
        font-size: 12px;
      }

      .search-host {
        position: absolute;
        right: 12px;
        bottom: 12px;
        left: 12px;
        width: auto;
        height: 50px;
      }

      .search-box,
      .search-host.is-open .search-box {
        width: 100%;
        height: 50px;
      }

      .search-input,
      .search-host.is-open .search-input {
        width: calc(100% - 48px);
        padding: 0 14px 0 18px;
        opacity: 1;
        pointer-events: auto;
      }

      .results {
        width: 100%;
        top: 56px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav" aria-label="Navegação principal do Portal ESEO">
      <a
        data-page="home"
        href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta"
        target="_blank"
        rel="noopener noreferrer"
      >Home</a>

      <a
        data-page="conheca"
        href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/Sobre-a-ESEO.aspx"
        target="_blank"
        rel="noopener noreferrer"
      >Conheça a ESEO</a>

      <a
        data-page="oferta"
        href="https://sesisenaisp.sharepoint.com/sites/ESEOConecta/SitePages/What's-happening.aspx"
        target="_blank"
        rel="noopener noreferrer"
      >Oferta de cursos online</a>
    </nav>

    <div class="search-host" id="searchHost">
      <form class="search-box" id="searchForm" role="search" autocomplete="off">
        <label class="sr-only" for="searchInput">
          Pesquisar somente no Portal ESEO
        </label>

        <input
          class="search-input"
          id="searchInput"
          type="search"
          placeholder="Pesquisar no Portal ESEO"
          aria-controls="results"
          aria-expanded="false"
        >

        <button
          class="search-button"
          type="submit"
          aria-label="Abrir ou executar pesquisa"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10.7" cy="10.7" r="6.8"></circle>
            <path d="m16 16 4.1 4.1"></path>
          </svg>
        </button>
      </form>

      <div class="results" id="results" role="listbox"></div>
    </div>
  </header>

  <script>
    (() => {
      const PORTAL = "https://sesisenaisp.sharepoint.com/sites/ESEOConecta";
      const host = document.getElementById("searchHost");
      const form = document.getElementById("searchForm");
      const input = document.getElementById("searchInput");
      const resultsBox = document.getElementById("results");

      const params = new URLSearchParams(location.search);
      const informedPage = (params.get("ativa") || "").toLowerCase();
      const referrer = (document.referrer || "").toLowerCase();

      let matches = [];
      let activeIndex = -1;
      let closeTimer;

      const ITEMS = [
        {
          title: "Home do Portal ESEO",
          subtitle: "Página inicial",
          icon: "H",
          url: PORTAL,
          keywords: "home início inicial portal eseo"
        },
        {
          title: "Conheça a ESEO",
          subtitle: "História, proposta e estrutura",
          icon: "E",
          url: PORTAL + "/SitePages/Sobre-a-ESEO.aspx",
          keywords: "história identidade missão valores proposta estrutura"
        },
        {
          title: "Oferta de cursos online",
          subtitle: "Portfólio, modelos e orientações",
          icon: "O",
          url: PORTAL + "/SitePages/What's-happening.aspx",
          keywords: "oferta cursos catálogo portfolio modelos orientações"
        },
        {
          title: "Catálogo inteligente de cursos",
          subtitle: "Filtros, formatos e carga horária",
          icon: "C",
          url: "https://marciosqueiroz.github.io/portal-eseo-webparts/eseo-catalogo-cursos.html",
          keywords: "catálogo portfolio cursos sgset autoinstrucional técnico superior"
        },
        {
          title: "Proposta Pedagógica da ESEO",
          subtitle: "Documento institucional",
          icon: "P",
          url:
            PORTAL +
            "/Documentos%20Compartilhados/Documentos%20da%20p%C3%A1gina%20ESEO/Proposta%20pedag%C3%B3gica%201.50.pdf?web=1",
          keywords: "proposta pedagógica documento 1.50"
        }
      ];

      const normalize = value =>
        String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();

      function resolveCurrentPage() {
        if (["home", "conheca", "oferta"].includes(informedPage)) {
          return informedPage;
        }

        if (referrer.includes("sobre-a-eseo")) return "conheca";

        if (
          referrer.includes("what%27s-happening") ||
          referrer.includes("what's-happening")
        ) return "oferta";

        return "";
      }

      const currentPage = resolveCurrentPage();

      document.querySelectorAll("[data-page]").forEach(link => {
        if (currentPage && link.dataset.page === currentPage) {
          link.setAttribute("aria-current", "page");
        } else {
          link.removeAttribute("aria-current");
        }
      });

      function openSearch(focusInput = true) {
        clearTimeout(closeTimer);
        host.classList.add("is-open");

        if (focusInput && window.innerWidth > 620) {
          setTimeout(() => input.focus({ preventScroll: true }), 80);
        }

        if (input.value.trim()) renderResults(input.value);
      }

      function closeSearch() {
        clearTimeout(closeTimer);

        closeTimer = setTimeout(() => {
          if (host.matches(":hover") || host.contains(document.activeElement)) {
            return;
          }

          host.classList.remove("is-open");
          resultsBox.classList.remove("visible");
          input.setAttribute("aria-expanded", "false");
          activeIndex = -1;
        }, 170);
      }

      function renderResults(value) {
        const query = normalize(value.trim());

        if (!query) {
          matches = [];
          activeIndex = -1;
          resultsBox.innerHTML = "";
          resultsBox.classList.remove("visible");
          input.setAttribute("aria-expanded", "false");
          return;
        }

        matches = ITEMS
          .filter(item =>
            normalize(`${item.title} ${item.subtitle} ${item.keywords}`)
              .includes(query)
          )
          .slice(0, 3);

        activeIndex = matches.length ? 0 : -1;

        resultsBox.innerHTML = matches.length
          ? matches.map((item, index) => `
              <button
                class="result-item ${index === 0 ? "active" : ""}"
                type="button"
                role="option"
                data-index="${index}"
              >
                <span class="result-icon" aria-hidden="true">${item.icon}</span>
                <span>
                  <strong>${item.title}</strong>
                  <small>${item.subtitle}</small>
                </span>
              </button>
            `).join("")
          : `
              <div class="no-result">
                Pressione Enter para pesquisar esta expressão somente no Portal ESEO.
              </div>
            `;

        resultsBox.classList.add("visible");
        input.setAttribute("aria-expanded", "true");

        resultsBox.querySelectorAll("[data-index]").forEach(button => {
          button.addEventListener("mouseenter", () => {
            setActive(Number(button.dataset.index));
          });

          button.addEventListener("click", () => {
            openItem(Number(button.dataset.index));
          });
        });
      }

      function setActive(index) {
        if (!matches.length) return;

        activeIndex = (index + matches.length) % matches.length;

        resultsBox.querySelectorAll(".result-item").forEach((item, itemIndex) => {
          item.classList.toggle("active", itemIndex === activeIndex);
        });
      }

      function openItem(index) {
        const item = matches[index];
        if (!item) return;
        window.open(item.url, "_blank", "noopener,noreferrer");
      }

      function searchPortal(term) {
        const destination =
          PORTAL +
          "/_layouts/15/search.aspx/siteall?q=" +
          encodeURIComponent(term);

        window.open(destination, "_blank", "noopener,noreferrer");
      }

      host.addEventListener("pointerenter", () => openSearch(true));
      host.addEventListener("pointerleave", closeSearch);
      host.addEventListener("focusin", () => openSearch(false));
      host.addEventListener("focusout", () => setTimeout(closeSearch, 0));

      input.addEventListener("input", event => {
        renderResults(event.target.value);
      });

      input.addEventListener("keydown", event => {
        if (event.key === "ArrowDown") {
          event.preventDefault();
          setActive(activeIndex + 1);
        } else if (event.key === "ArrowUp") {
          event.preventDefault();
          setActive(activeIndex - 1);
        } else if (event.key === "Escape") {
          event.preventDefault();
          input.blur();
          closeSearch();
        }
      });

      form.addEventListener("submit", event => {
        event.preventDefault();

        if (!host.classList.contains("is-open")) {
          openSearch(true);
          return;
        }

        const term = input.value.trim();

        if (!term) {
          openSearch(true);
          return;
        }

        if (matches.length && activeIndex >= 0) {
          openItem(activeIndex);
        } else {
          searchPortal(term);
        }
      });
    })();
  </script>
</body>
</html>
