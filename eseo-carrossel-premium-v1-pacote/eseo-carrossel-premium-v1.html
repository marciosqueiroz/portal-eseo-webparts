<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrossel do Portal ESEO</title>
  <style>
    :root { --accent: #ffb900; --height: 410px; }
    * { box-sizing: border-box; }
    html, body { width: 100%; margin: 0; background: transparent; font-family: "Segoe UI", Arial, sans-serif; }
    body { padding: 0; }
    .carousel { position: relative; width: 100%; height: var(--height); overflow: hidden; border-radius: 14px; background: #0b1726; box-shadow: 0 18px 45px rgba(0,0,0,.18); }
    .viewport, .track { width: 100%; height: 100%; }
    .track { position: relative; margin: 0; padding: 0; list-style: none; }
    .slide { position: absolute; inset: 0; visibility: hidden; opacity: 0; transform: scale(1.015); transition: opacity .5s ease, transform .7s ease, visibility .5s; }
    .slide.active { visibility: visible; opacity: 1; transform: scale(1); z-index: 1; }
    .slide img { width: 100%; height: 100%; display: block; object-fit: cover; object-position: var(--position, center); }
    .slide::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(3,10,18,.88) 0%, rgba(3,10,18,.68) 42%, rgba(3,10,18,.12) 78%); }
    .slide.light::after { background: linear-gradient(90deg, rgba(255,255,255,.96) 0%, rgba(255,255,255,.84) 46%, rgba(255,255,255,.08) 78%); }
    .content { position: absolute; z-index: 2; left: clamp(24px, 5vw, 72px); top: 50%; width: min(560px, 55%); color: #fff; transform: translateY(-50%); }
    .light .content { color: #071a30; }
    .tag { display: inline-flex; margin-bottom: 14px; padding: 6px 10px; border-radius: 4px; color: #fff; background: #8d0909; font-size: 12px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    h2 { max-width: 720px; margin: 0 0 17px; font-size: clamp(29px, 3.1vw, 48px); line-height: 1.04; letter-spacing: -.025em; text-transform: uppercase; }
    p { max-width: 540px; margin: 0; font-size: clamp(15px, 1.25vw, 19px); line-height: 1.45; }
    .cta { display: inline-flex; align-items: center; gap: 8px; margin-top: 22px; padding: 10px 15px; border: 1px solid rgba(255,255,255,.75); border-radius: 7px; color: inherit; background: rgba(255,255,255,.1); font-size: 14px; font-weight: 700; text-decoration: none; backdrop-filter: blur(8px); transition: background .18s ease, color .18s ease, transform .18s ease; }
    .light .cta { border-color: rgba(7,26,48,.35); background: rgba(255,255,255,.7); }
    .cta:hover, .cta:focus-visible { color: #071a30; background: #fff; transform: translateY(-2px); outline: 3px solid rgba(255,185,0,.55); outline-offset: 2px; }
    .controls { position: absolute; z-index: 4; right: 22px; bottom: 18px; display: flex; align-items: center; gap: 12px; }
    .arrow { width: 42px; height: 42px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,.65); border-radius: 50%; color: #fff; background: rgba(3,13,23,.52); cursor: pointer; backdrop-filter: blur(8px); }
    .arrow:hover, .arrow:focus-visible { color: #071a30; background: var(--accent); outline: 2px solid #fff; }
    .dots { display: flex; gap: 7px; padding: 9px 11px; border-radius: 20px; background: rgba(3,13,23,.52); backdrop-filter: blur(8px); }
    .dot { width: 9px; height: 9px; margin: 0; padding: 0; border: 0; border-radius: 50%; background: rgba(255,255,255,.6); cursor: pointer; }
    .dot.active { width: 24px; border-radius: 6px; background: var(--accent); }
    .sr-only { position: absolute; width: 1px; height: 1px; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); }
    @media (max-width: 700px) {
      :root { --height: 430px; }
      .slide::after, .slide.light::after { background: linear-gradient(0deg, rgba(3,10,18,.94) 0%, rgba(3,10,18,.62) 58%, rgba(3,10,18,.12) 100%); }
      .light .content { color: #fff; }
      .content { left: 22px; right: 22px; top: auto; bottom: 74px; width: auto; transform: none; }
      h2 { margin-bottom: 11px; font-size: clamp(26px, 8vw, 36px); }
      p { font-size: 15px; display: -webkit-box; overflow: hidden; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
      .cta { margin-top: 14px; }
      .controls { right: 14px; bottom: 14px; }
      .arrow { width: 38px; height: 38px; }
    }
    @media (prefers-reduced-motion: reduce) { .slide, .cta { transition: none; } }
  </style>
</head>
<body>
  <section class="carousel" id="carousel" aria-roledescription="carrossel" aria-label="Novidades do Portal ESEO">
    <div class="viewport" aria-live="polite"><ul class="track" id="track"></ul></div>
    <div class="controls">
      <button class="arrow" id="prev" type="button" aria-label="Notícia anterior">&#10094;</button>
      <div class="dots" id="dots" aria-label="Escolher notícia"></div>
      <button class="arrow" id="next" type="button" aria-label="Próxima notícia">&#10095;</button>
    </div>
    <span class="sr-only" id="status"></span>
  </section>

  <script>
    /* EDITE SOMENTE ESTE BLOCO PARA TROCAR CONTEÚDOS DO CARROSSEL. */
    const slides = [
      {
        imagem: "curso-desenvolvimento.jpg",
        posicao: "center",
        selo: "Nova oferta",
        titulo: "Curso Técnico Desenvolvimento de Sistemas - 1.200 horas",
        texto: "O novo Curso Técnico em Desenvolvimento de Sistemas a distância já está disponível para a rede SENAI-SP. A oferta foi reestruturada conforme o novo plano de curso e amplia as oportunidades de formação em uma das áreas mais demandadas pelo mercado.",
        link: "https://www.sp.senai.br/curso/tecnico-em-desenvolvimento-de-sistemas/108091"
      },
      {
        imagem: "rotulos-cosmeticos.jpg",
        posicao: "center",
        selo: "Nova oferta",
        titulo: "Por Dentro dos Rótulos de Cosméticos - 10 horas",
        texto: "O curso Por Dentro dos Rótulos de Cosméticos ensina a interpretar rótulos, analisar ingredientes e compreender as informações obrigatórias dos cosméticos, desenvolvendo competências para comparar produtos e realizar escolhas mais conscientes e seguras.",
        link: "https://sesisenaisp.sharepoint.com/sites/ESEOConecta/Lists/Galeria%20de%20posts%20para%20redes%20sociais/DispForm.aspx?ID=3&e=PM0QON"
      },
      {
        imagem: "boletim-eseo.png",
        posicao: "center",
        selo: "Notícias",
        titulo: "Conheça o Boletim ESEO",
        texto: "Assine e receba periodicamente novidades do mundo EAD.",
        link: "https://outlook.office.com/newsletters/newsletters/eb0f379967babb4b816eae11c96c0d0322"
      },
      {
        imagem: "conheca-eseo.jpg",
        posicao: "center",
        selo: "Identidade",
        titulo: "Conheça a ESEO",
        texto: "Conheça nossa história, identidade e estrutura — e entenda como a Escola SENAI de Educação Online evoluiu para transformar a educação a distância.",
        link: ""
      },
      {
        imagem: "assistente-eseo.png",
        posicao: "left center",
        tema: "light",
        selo: "Assistente virtual",
        titulo: "Olá, posso te ajudar?",
        texto: "Nosso assistente virtual ESEO pode esclarecer dúvidas sobre conteúdos, serviços e informações do portal. Para iniciar uma conversa, clique no ícone do Copilot no canto da página.",
        link: ""
      }
    ];

    const track = document.getElementById("track");
    const dots = document.getElementById("dots");
    const status = document.getElementById("status");
    const carousel = document.getElementById("carousel");
    let current = 0;
    let timer;

    function slideMarkup(slide, index) {
      const cta = slide.link ? `<a class="cta" href="${slide.link}" target="_blank" rel="noopener noreferrer">Saiba mais <span aria-hidden="true">→</span></a>` : "";
      return `<li class="slide ${slide.tema === "light" ? "light" : ""}" style="--position:${slide.posicao || "center"}" aria-hidden="${index !== 0}">
        <img src="${slide.imagem}" alt="" loading="${index === 0 ? "eager" : "lazy"}">
        <div class="content"><span class="tag">${slide.selo}</span><h2>${slide.titulo}</h2><p>${slide.texto}</p>${cta}</div>
      </li>`;
    }

    track.innerHTML = slides.map(slideMarkup).join("");
    dots.innerHTML = slides.map((_, i) => `<button class="dot" type="button" aria-label="Ir para a notícia ${i + 1}"></button>`).join("");
    const items = [...document.querySelectorAll(".slide")];
    const dotButtons = [...document.querySelectorAll(".dot")];

    function show(index, announce = true) {
      current = (index + slides.length) % slides.length;
      items.forEach((item, i) => { item.classList.toggle("active", i === current); item.setAttribute("aria-hidden", i !== current); });
      dotButtons.forEach((dot, i) => { dot.classList.toggle("active", i === current); dot.setAttribute("aria-current", i === current ? "true" : "false"); });
      if (announce) status.textContent = `Notícia ${current + 1} de ${slides.length}: ${slides[current].titulo}`;
    }

    function restart() { clearInterval(timer); timer = setInterval(() => show(current + 1, false), 7000); }
    document.getElementById("prev").addEventListener("click", () => { show(current - 1); restart(); });
    document.getElementById("next").addEventListener("click", () => { show(current + 1); restart(); });
    dotButtons.forEach((dot, i) => dot.addEventListener("click", () => { show(i); restart(); }));
    carousel.addEventListener("mouseenter", () => clearInterval(timer));
    carousel.addEventListener("mouseleave", restart);
    carousel.addEventListener("focusin", () => clearInterval(timer));
    carousel.addEventListener("focusout", restart);
    carousel.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") { show(current - 1); restart(); }
      if (event.key === "ArrowRight") { show(current + 1); restart(); }
    });
    show(0, false);
    if (!matchMedia("(prefers-reduced-motion: reduce)").matches) restart();
  </script>
</body>
</html>
