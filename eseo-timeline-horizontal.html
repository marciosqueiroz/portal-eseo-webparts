<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa história — ESEO</title>
  <style>
    :root {
      --navy: #0a2537;
      --cyan: #0eb7d5;
      --red: #970025;
      --white: #ffffff;
      --line: #d6e4ea;
      --muted: #61717c;
      --focus: #ffcb05;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: transparent;
      color: var(--navy);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body { padding: 10px; }

    .timeline {
      width: 100%;
      min-height: 455px;
      padding: 26px clamp(20px,3vw,50px) 24px;
      overflow: hidden;
      border: 1px solid rgba(10,37,55,.08);
      border-radius: 18px;
      background: rgba(255,255,255,.96);
    }

    .track-scroll {
      width: 100%;
      overflow-x: auto;
      padding: 3px 0 14px;
      scrollbar-color: #8db9c7 #edf4f6;
      scrollbar-width: thin;
    }

    .track {
      position: relative;
      min-width: 1260px;
      height: 150px;
      display: grid;
      grid-template-columns: 72px repeat(12,minmax(88px,1fr)) 82px;
      align-items: end;
      gap: 0;
    }

    .track::before {
      position: absolute;
      right: 38px;
      bottom: 33px;
      left: 36px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg,var(--navy),var(--cyan));
      content: "";
    }

    .terminal,
    .point {
      position: relative;
      z-index: 1;
      height: 118px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-direction: column;
      padding: 0;
      border: 0;
      background: transparent;
    }

    .point { cursor: pointer; }

    .year,
    .terminal__label {
      min-width: 70px;
      margin-bottom: 20px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--white);
      color: var(--navy);
      font-size: 11.5px;
      font-weight: 900;
      line-height: 1.05;
      text-align: center;
      white-space: nowrap;
      transition: transform .18s ease, border-color .18s ease, color .18s ease;
    }

    .dot,
    .terminal__dot {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 4px solid var(--white);
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0 3px #1c819b;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .point:hover .year,
    .point:focus-visible .year,
    .point.is-active .year {
      border-color: var(--cyan);
      color: #007f9e;
      transform: translateY(-4px);
    }

    .point:hover .dot,
    .point:focus-visible .dot,
    .point.is-active .dot {
      background: var(--navy);
      box-shadow: 0 0 0 3px var(--navy),0 7px 18px rgba(10,37,55,.18);
      transform: scale(1.13);
    }

    .terminal__dot {
      background: var(--red);
      box-shadow: 0 0 0 3px var(--red);
    }

    .terminal--end .terminal__dot {
      background: var(--cyan);
      color: var(--navy);
      box-shadow: 0 0 0 3px var(--navy);
      font-size: 17px;
      font-weight: 900;
    }

    .terminal__label {
      border-color: rgba(151,0,37,.24);
      color: var(--red);
    }

    .terminal--end .terminal__label {
      border-color: rgba(14,183,213,.36);
      color: var(--navy);
    }

    .story {
      width: min(1080px,100%);
      min-height: 185px;
      margin: 8px auto 0;
      padding: 27px 35px 25px 40px;
      border-top: 4px solid var(--cyan);
      border-radius: 0 0 14px 14px;
      background: #f8fbfc;
      box-shadow: 0 16px 34px rgba(10,37,55,.065);
    }

    .story__meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .story__sequence {
      color: #087f9c;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .story__year {
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--navy);
      color: var(--white);
      font-size: 13px;
      font-weight: 900;
    }

    .story h2 {
      margin: 0 0 9px;
      color: var(--navy);
      font-size: clamp(25px,2.3vw,37px);
      line-height: 1.08;
      letter-spacing: -.025em;
    }

    .story p {
      max-width: 980px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px,1.15vw,17px);
      line-height: 1.55;
    }

    .hint {
      margin: 15px 0 0;
      color: #70808a;
      font-size: 11.5px;
      font-weight: 650;
      text-align: center;
    }

    :focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <section class="timeline" aria-label="Linha do tempo da Escola SENAI de Educação Online">
    <div class="track-scroll" aria-label="Marcos históricos — role horizontal">
      <div class="track" id="track">
        <span class="terminal terminal--start" aria-hidden="true">
          <span class="terminal__label">INÍCIO</span>
          <span class="terminal__dot"></span>
        </span>
      </div>
    </div>

    <article class="story" id="story" aria-live="polite">
      <div class="story__meta">
        <span class="story__sequence" id="storySequence">Marco 01 de 12</span>
        <span class="story__year" id="storyYear">1979</span>
      </div>
      <h2 id="storyTitle">O primeiro marco: Desenho Técnico-Mecânico</h2>
      <p id="storyDescription">Lançamento do curso de Leitura e Interpretação de Desenho Técnico-Mecânico, combinando módulos impressos com salas equipadas com televisores.</p>
    </article>

    <p class="hint">Passe o cursor pelas datas, clique ou use as setas do teclado.</p>
  </section>

  <script>
    (() => {
      const events = [
        ["1979", "O primeiro marco: Desenho Técnico-Mecânico", "Lançamento do curso de Leitura e Interpretação de Desenho Técnico-Mecânico, combinando módulos impressos com salas equipadas com televisores."],
        ["1990", "Expansão do modelo híbrido", "Consolidação do catálogo e expansão do modelo baseado em materiais impressos e videoaulas."],
        ["1995", "A era do Telecurso 2000", "O SENAI-SP participa do desenvolvimento do Telecurso 2000 Profissionalizante em Mecânica, experiência marcante da Educação a Distância."],
        ["2007", "Nascimento do Centro de EaD", "Criação do grupo que daria origem ao Centro SENAI de Educação a Distância e início da transição para recursos digitais."],
        ["2010", "Pioneirismo no ensino superior", "O curso de Tecnologia de Produção Gráfica passa a ofertar unidades curriculares a distância, introduzindo o modelo híbrido na graduação."],
        ["2010–2017", "A virada digital e a escala", "A cultura digital se consolida e o SENAI-SP alcança 1,5 milhão de alunos em cursos a distância ao longo de pouco mais de dez anos."],
        ["2017", "Primeiro curso técnico semipresencial", "A primeira oferta é implantada em Santos e rapidamente se expande para sete cursos e 19 turmas."],
        ["2019", "Expansão para a pós-graduação", "A especialização em Inovação e Competitividade Industrial abre caminho para novas ofertas digitais no ensino superior."],
        ["2020", "Aceleração durante a pandemia", "O SENAI-SP amplia rapidamente as soluções online e registra mais de 800 mil matrículas em diferentes tipos de cursos."],
        ["2022", "Consolidação da ESEO", "A estrutura de EaD passa a ser oficialmente nomeada Escola SENAI de Educação Online e amplia sua atuação em soluções educacionais digitais."],
        ["2025", "Novo marco regulatório", "O Decreto nº 12.456/2025 redefine formatos, exigências presenciais, infraestrutura e critérios de qualidade no Ensino Superior."],
        ["2026", "Portal ESEO e nova jornada digital", "A ESEO avança na organização de conteúdos, autosserviços, orientações e soluções digitais para facilitar a experiência das escolas e dos usuários."]
      ];

      const track = document.getElementById("track");
      const sequence = document.getElementById("storySequence");
      const year = document.getElementById("storyYear");
      const title = document.getElementById("storyTitle");
      const description = document.getElementById("storyDescription");
      let activeIndex = 0;

      events.forEach((event, index) => {
        const point = document.createElement("button");
        point.type = "button";
        point.className = "point" + (index === 0 ? " is-active" : "");
        point.dataset.index = index;
        point.setAttribute("aria-label", `${event[0]}: ${event[1]}`);
        point.setAttribute("aria-pressed", index === 0 ? "true" : "false");
        point.innerHTML =
          `<span class="year">${event[0]}</span>` +
          '<span class="dot" aria-hidden="true"></span>';
        track.appendChild(point);
      });

      const end = document.createElement("span");
      end.className = "terminal terminal--end";
      end.setAttribute("aria-hidden", "true");
      end.innerHTML =
        '<span class="terminal__label">CONTINUA</span>' +
        '<span class="terminal__dot">→</span>';
      track.appendChild(end);

      const points = [...track.querySelectorAll(".point")];

      function activate(index, focus = false) {
        activeIndex = (index + events.length) % events.length;
        const event = events[activeIndex];

        points.forEach((point, pointIndex) => {
          const active = pointIndex === activeIndex;
          point.classList.toggle("is-active", active);
          point.setAttribute("aria-pressed", String(active));
        });

        sequence.textContent = `Marco ${String(activeIndex + 1).padStart(2,"0")} de ${events.length}`;
        year.textContent = event[0];
        title.textContent = event[1];
        description.textContent = event[2];

        if (focus) {
          points[activeIndex].focus();
          points[activeIndex].scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
        }
      }

      points.forEach((point, index) => {
        point.addEventListener("mouseenter", () => activate(index));
        point.addEventListener("focus", () => activate(index));
        point.addEventListener("click", () => activate(index, true));
      });

      track.addEventListener("keydown", event => {
        if (event.key === "ArrowRight") {
          event.preventDefault();
          activate(activeIndex + 1, true);
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          activate(activeIndex - 1, true);
        } else if (event.key === "Home") {
          event.preventDefault();
          activate(0, true);
        } else if (event.key === "End") {
          event.preventDefault();
          activate(events.length - 1, true);
        }
      });
    })();
  </script>
</body>
</html>
