<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa história — ESEO</title>
  <style>
    :root {
      --navy: #0a2537;
      --cyan: #0eb7d5;
      --red: #970025;
      --white: #ffffff;
      --line: #d6e4ea;
      --muted: #61717c;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--navy);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .timeline {
      width: 100%;
      height: 100%;
      min-height: 440px;
      padding: 34px clamp(28px, 3vw, 58px) 28px;
      background: var(--white);
    }

    .track {
      position: relative;
      height: 158px;
      margin: 0 auto;
    }

    .track__line {
      position: absolute;
      right: 1.5%;
      bottom: 35px;
      left: 1.5%;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--navy), var(--cyan));
    }

    .point,
    .terminal {
      position: absolute;
      bottom: 17px;
      left: var(--x);
      width: 38px;
      height: 38px;
      padding: 0;
      border: 0;
      background: transparent;
      transform: translateX(-50%);
    }

    .point { cursor: pointer; }

    .point__dot,
    .terminal__dot {
      position: absolute;
      inset: 7px;
      display: grid;
      place-items: center;
      border: 4px solid var(--white);
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0 3px #1c819b;
      transition: inset 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .point:hover .point__dot,
    .point:focus-visible .point__dot,
    .point.is-active .point__dot {
      inset: 3px;
      background: var(--navy);
      box-shadow: 0 0 0 3px var(--navy), 0 7px 18px rgba(10, 37, 55, .2);
    }

    .point:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 5px;
      border-radius: 50%;
    }

    .point__year,
    .terminal__label {
      position: absolute;
      left: 50%;
      bottom: 52px;
      min-width: 66px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--white);
      color: var(--navy);
      font-size: 12px;
      font-weight: 850;
      line-height: 1.05;
      text-align: center;
      white-space: nowrap;
      transform: translateX(-50%);
      transition: border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .point:hover .point__year,
    .point:focus-visible .point__year,
    .point.is-active .point__year {
      border-color: var(--cyan);
      color: #007f9e;
      transform: translateX(-50%) translateY(-4px);
    }

    .terminal__dot {
      inset: 3px;
      background: var(--red);
      box-shadow: 0 0 0 3px var(--red);
    }

    .terminal--end .terminal__dot {
      background: var(--cyan);
      color: var(--navy);
      box-shadow: 0 0 0 3px var(--navy);
      font-size: 19px;
      font-weight: 900;
    }

    .terminal__label {
      border-color: rgba(151, 0, 37, .24);
      color: var(--red);
    }

    .terminal--end .terminal__label {
      border-color: rgba(14, 183, 213, .36);
      color: var(--navy);
    }

    .story {
      width: min(1040px, 100%);
      min-height: 190px;
      margin: 4px auto 0;
      padding: 28px 36px 26px 42px;
      border-top: 4px solid var(--cyan);
      background: #f8fbfc;
      box-shadow: 0 18px 38px rgba(10, 37, 55, .07);
    }

    .story__meta {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 11px;
    }

    .story__sequence {
      color: #087f9c;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .story__year {
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--navy);
      color: var(--white);
      font-size: 13px;
      font-weight: 850;
    }

    .story h2 {
      margin: 0 0 9px;
      color: var(--navy);
      font-size: clamp(26px, 2.4vw, 38px);
      line-height: 1.08;
      letter-spacing: -.025em;
    }

    .story p {
      max-width: 950px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 1.25vw, 18px);
      line-height: 1.55;
    }

    .hint {
      margin: 17px 0 0;
      color: #70808a;
      font-size: 12px;
      font-weight: 650;
      text-align: center;
    }

    .hint::before {
      display: inline-block;
      width: 7px;
      height: 7px;
      margin: 0 8px 1px 0;
      border-radius: 50%;
      background: var(--cyan);
      content: "";
    }

    @media (max-width: 900px) {
      .timeline { padding-inline: 20px; overflow-x: auto; }
      .track, .story, .hint { min-width: 1050px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <section class="timeline" aria-label="Linha do tempo da Escola SENAI de Educação Online">
    <div class="track" id="track">
      <div class="track__line" aria-hidden="true"></div>

      <span class="terminal terminal--start" style="--x:1.5%;" aria-hidden="true">
        <span class="terminal__dot"></span>
        <span class="terminal__label">INÍCIO</span>
      </span>

      <span class="terminal terminal--end" style="--x:98.5%;" aria-hidden="true">
        <span class="terminal__dot">→</span>
        <span class="terminal__label">CONTINUA</span>
      </span>
    </div>

    <article class="story" id="story" aria-live="polite">
      <div class="story__meta">
        <span class="story__sequence" id="storySequence">Marco 01 de 11</span>
        <span class="story__year" id="storyYear">1979</span>
      </div>
      <h2 id="storyTitle">O primeiro marco: Desenho Técnico-Mecânico</h2>
      <p id="storyDescription">Lançamento do curso de Leitura e Interpretação de Desenho Técnico-Mecânico, combinando módulos impressos com salas equipadas com televisores.</p>
    </article>

    <p class="hint">Passe o cursor pelas datas, clique ou use as setas do teclado.</p>
  </section>

  <script>
    (function () {
      const events = [
        ["1979", "O primeiro marco: Desenho Técnico-Mecânico", "Lançamento do curso de Leitura e Interpretação de Desenho Técnico-Mecânico, combinando módulos impressos com salas equipadas com televisores."],
        ["1990", "Expansão do modelo híbrido", "Consolidação do catálogo e expansão do modelo baseado em materiais impressos e videoaulas."],
        ["1995", "A era do Telecurso 2000", "O SENAI-SP participa do desenvolvimento do Telecurso 2000 Profissionalizante em Mecânica, experiência marcante da Educação a Distância."],
        ["2007", "Nascimento do Centro de EaD", "Criação do grupo que daria origem ao Centro SENAI de Educação a Distância e início da transição para recursos digitais."],
        ["2010", "Pioneirismo no ensino superior", "O curso de Tecnologia de Produção Gráfica passa a ofertar unidades curriculares a distância, introduzindo o modelo híbrido na graduação."],
        ["2010–2017", "A virada digital e a escala", "A cultura digital se consolida e o SENAI-SP alcança 1,5 milhão de alunos em cursos a distância ao longo de pouco mais de dez anos."],
        ["2017", "Primeiro curso técnico semipresencial", "A primeira oferta é implantada em Santos e rapidamente se expande para sete cursos e 19 turmas."],
        ["2019", "Expansão para a pós-graduação", "A especialização em Inovação e Competitividade Industrial abre caminho para novas ofertas digitais no ensino superior."],
        ["2020", "Aceleração durante a pandemia", "O SENAI-SP amplia rapidamente as soluções online e registra mais de 800 mil matrículas em diferentes tipos de cursos."],
        ["2022", "Consolidação da ESEO", "A estrutura de EaD passa a ser oficialmente nomeada Escola SENAI de Educação Online e amplia sua atuação em soluções educacionais digitais."],
        ["2025", "Novo marco regulatório", "O Decreto nº 12.456/2025 redefine formatos, exigências presenciais, infraestrutura e critérios de qualidade no Ensino Superior."]
      ];

      const track = document.getElementById("track");
      const sequence = document.getElementById("storySequence");
      const year = document.getElementById("storyYear");
      const title = document.getElementById("storyTitle");
      const description = document.getElementById("storyDescription");
      let activeIndex = 0;

      events.forEach(function (event, index) {
        const point = document.createElement("button");
        const x = 6.2 + (index * (87.6 / (events.length - 1)));
        point.className = "point" + (index === 0 ? " is-active" : "");
        point.type = "button";
        point.style.setProperty("--x", x + "%");
        point.dataset.index = index;
        point.setAttribute("aria-label", event[0] + ": " + event[1]);
        point.setAttribute("aria-pressed", index === 0 ? "true" : "false");
        point.innerHTML =
          '<span class="point__dot" aria-hidden="true"></span>' +
          '<span class="point__year">' + event[0] + '</span>';
        track.appendChild(point);
      });

      const points = [...track.querySelectorAll(".point")];

      function activate(index, focus) {
        activeIndex = (index + events.length) % events.length;
        const event = events[activeIndex];

        points.forEach(function (point, pointIndex) {
          const active = pointIndex === activeIndex;
          point.classList.toggle("is-active", active);
          point.setAttribute("aria-pressed", active ? "true" : "false");
        });

        sequence.textContent = "Marco " + String(activeIndex + 1).padStart(2, "0") + " de " + events.length;
        year.textContent = event[0];
        title.textContent = event[1];
        description.textContent = event[2];
        if (focus) points[activeIndex].focus();
      }

      points.forEach(function (point, index) {
        point.addEventListener("mouseenter", function () { activate(index, false); });
        point.addEventListener("focus", function () { activate(index, false); });
        point.addEventListener("click", function () { activate(index, true); });
      });

      track.addEventListener("keydown", function (event) {
        if (event.key === "ArrowRight") {
          event.preventDefault();
          activate(activeIndex + 1, true);
        }
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          activate(activeIndex - 1, true);
        }
        if (event.key === "Home") {
          event.preventDefault();
          activate(0, true);
        }
        if (event.key === "End") {
          event.preventDefault();
          activate(events.length - 1, true);
        }
      });
    })();
  </script>
</body>
</html>
