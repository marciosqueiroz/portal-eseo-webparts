<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Assistente ESEO animado</title>

  <style>
    :root {
      --navy: #0A2537;
      --blue: #1D728F;
      --cyan: #0EB7D5;
      --red: #E30613;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 305px;
      margin: 0;
      overflow: hidden;
      background: var(--white);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .assistant {
      position: relative;
      width: min(100%, 760px);
      height: 305px;
      overflow: hidden;
      background: var(--white);
    }

    .assistant::after {
      position: absolute;
      right: 7%;
      bottom: 31px;
      width: 150px;
      height: 2px;
      border-radius: 99px;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(14, 183, 213, .42), transparent);
    }

    .assistant__character {
      position: absolute;
      left: -8px;
      bottom: -28px;
      width: 420px;
      max-width: 66vw;
      transform-origin: 27% 82%;
      animation:
        enter 900ms cubic-bezier(.2, .8, .2, 1) both,
        greeting 3.8s ease-in-out 1.1s infinite;
      will-change: transform;
    }

    .assistant__character img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .speech {
      position: absolute;
      z-index: 2;
      left: 278px;
      top: 143px;
      width: min(360px, calc(100% - 300px));
      padding: 18px 21px 18px 23px;
      border: 1px solid rgba(14, 183, 213, .42);
      border-radius: 14px;
      background: var(--navy);
      color: var(--white);
      box-shadow: 0 16px 34px rgba(10, 37, 55, .22);
      opacity: 0;
      transform: translateY(10px) scale(.98);
      animation: speechIn 520ms ease 1.25s forwards;
    }

    .speech::before {
      position: absolute;
      left: -11px;
      top: 31px;
      width: 20px;
      height: 20px;
      content: "";
      background: var(--navy);
      transform: rotate(45deg);
    }

    .speech__eyebrow {
      display: block;
      margin-bottom: 5px;
      color: var(--cyan);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .speech__text {
      display: block;
      font-size: clamp(15px, 2vw, 19px);
      font-weight: 700;
      line-height: 1.35;
    }

    .speech__text strong { color: var(--white); }

    .speech__detail {
      position: absolute;
      right: 19px;
      bottom: -3px;
      width: 52px;
      height: 5px;
      border-radius: 99px;
      background: var(--red);
    }

    @keyframes enter {
      from { opacity: 0; transform: translateX(-58px) translateY(8px); }
      to { opacity: 1; transform: translateX(0) translateY(0); }
    }

    @keyframes greeting {
      0%, 100% { transform: translateY(0) rotate(0); }
      18% { transform: translateY(-5px) rotate(-1.2deg); }
      34% { transform: translateY(0) rotate(1.1deg); }
      50% { transform: translateY(-3px) rotate(-.7deg); }
      66% { transform: translateY(0) rotate(.5deg); }
    }

    @keyframes speechIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 630px) {
      html, body { min-height: 340px; }
      .assistant { height: 340px; }
      .assistant__character {
        left: -22px;
        bottom: -7px;
        width: 355px;
        max-width: 88vw;
      }
      .speech {
        right: 14px;
        left: auto;
        top: 18px;
        width: min(330px, calc(100% - 28px));
      }
      .speech::before {
        top: auto;
        bottom: -8px;
        left: 35%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .assistant__character,
      .speech {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <section class="assistant" aria-label="Orientação do Assistente ESEO">
    <div class="assistant__character">
      <img src="eseo-carrossel-premium-v3-pacote/assistente-eseo.png"
           alt="Mascote do Assistente ESEO acenando">
    </div>

    <p class="speech" id="assistantMessage">
      <span class="speech__eyebrow">Assistente ESEO</span>
      <span class="speech__text">Precisando de ajuda? Clique no botão <strong>Assistente ESEO</strong>.</span>
      <span class="speech__detail" aria-hidden="true"></span>
    </p>
  </section>
</body>
</html>
