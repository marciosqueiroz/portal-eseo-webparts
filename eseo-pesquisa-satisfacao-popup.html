<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pesquisa de satisfação — pop-up</title>
  <script src="https://mfpembedcdnwus2.azureedge.net/mfpembedcontwus2/Embed.js" type="text/javascript"></script>
  <link rel="stylesheet" href="https://mfpembedcdnwus2.azureedge.net/mfpembedcontwus2/Embed.css">
  <style>
    :root { --red:#970025; --red-dark:#73001d; --yellow:#ffbf00; --text:#17171a; --muted:#5f626b; }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; background:#fff; font-family:"Segoe UI",Arial,sans-serif; color:var(--text); }
    .section { min-height:360px; padding:54px clamp(28px,6vw,90px); display:flex; align-items:center; }
    .content { width:min(1250px,100%); margin:auto; display:grid; grid-template-columns:minmax(300px,1fr) auto; gap:54px; align-items:end; }
    .eyebrow { margin:0 0 20px; color:var(--red); font-size:15px; line-height:1.2; font-weight:900; letter-spacing:.18em; text-transform:uppercase; }
    .eyebrow::before { content:""; display:inline-block; width:34px; height:4px; margin:0 12px 4px 0; border-radius:20px; background:var(--red); }
    h1 { max-width:720px; margin:0 0 14px; font-size:clamp(38px,4.5vw,64px); line-height:1; font-weight:400; letter-spacing:-.045em; }
    .description { max-width:680px; margin:0; color:var(--muted); font-size:clamp(17px,1.5vw,21px); line-height:1.5; }
    .open-survey { min-width:245px; min-height:58px; padding:0 26px; border:0; border-radius:4px; background:var(--red); color:#fff; font:800 14px/1 "Segoe UI",Arial,sans-serif; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; box-shadow:0 12px 28px rgba(151,0,37,.18); transition:.2s ease; }
    .open-survey:hover,.open-survey:focus-visible { background:var(--red-dark); transform:translateY(-2px); box-shadow:0 16px 34px rgba(151,0,37,.28); }
    .open-survey span { color:var(--yellow); margin-left:10px; font-size:20px; }
    #MfpEmbed_Popup { max-width:760px!important; max-height:680px!important; }
    @media(max-width:820px){ .section{padding:36px 22px;} .content{grid-template-columns:1fr;gap:28px;align-items:start;} .open-survey{width:100%;} }
  </style>
</head>
<body>
  <main class="section">
    <div class="content">
      <div>
        <p class="eyebrow">Sua experiência importa</p>
        <h1>Como está sendo usar o Portal ESEO?</h1>
        <p class="description">Uma resposta rápida ajuda a equipe a priorizar as próximas melhorias.</p>
      </div>
      <button class="open-survey" id="openSurvey" type="button">Avaliar o Portal <span aria-hidden="true">→</span></button>
    </div>
  </main>
  <script>
    function renderSurvey(FirstName, LastName, locale, companyname, Email){
      var se = new SurveyEmbed(
        "3qZIQdENBE2kxXjjdOT21nGK6v4eNzNJg4WxJUmaEBNUOTFNNlI1V1RBMFJSNFNMNlBDRVpOSko0RC4u",
        "https://customervoice.microsoft.com/",
        "https://mfpembedcdnwus2.azureedge.net/mfpembedcontwus2/",
        "true"
      );
      var context={"First Name":FirstName,"Last Name":LastName,"locale":locale,"companyname":companyname,"Email":Email};
      se.renderPopup(context);
    }
    document.getElementById("openSurvey").addEventListener("click",function(){
      renderSurvey("","","pt-BR","SENAI-SP","");
    });
  </script>
</body>
</html>
