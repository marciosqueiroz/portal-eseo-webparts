<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pesquisa de satisfação — Portal ESEO</title>

  <style>
    :root {
      --navy: #0A2537;
      --cyan: #0EB7D5;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 82px;
      margin: 0;
      display: grid;
      place-items: center;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .survey-link {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 22px;
      border: 1px solid rgba(14, 183, 213, .86);
      border-radius: 10px;
      background: rgba(10, 37, 55, .92);
      color: var(--white);
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: .035em;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .13);
      transition: background 180ms ease, color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }

    .survey-link:hover {
      background: var(--cyan);
      color: var(--navy);
      box-shadow: 0 13px 28px rgba(10, 37, 55, .2);
      transform: translateY(-2px);
    }

    .survey-link:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 3px;
    }

    .survey-link svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (prefers-reduced-motion: reduce) {
      .survey-link { transition: none; }
    }
  </style>
</head>

<body>
  <a class="survey-link"
     href="https://customervoice.microsoft.com/Pages/ResponsePage.aspx?id=3qZIQdENBE2kxXjjdOT21nGK6v4eNzNJg4WxJUmaEBNUOTFNNlI1V1RBMFJSNFNMNlBDRVpOSko0RC4u"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="Avaliar o Portal ESEO no formulário oficial. Abre em nova aba.">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 15a4 4 0 0 1-4 4H8l-5 3 1.5-5A7 7 0 0 1 3 12a7 7 0 0 1 7-7h7a4 4 0 0 1 4 4Z"></path>
    </svg>
    Avaliar o Portal ESEO
  </a>
</body>
</html>
